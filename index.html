<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Acta</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #7d8590;
  --accent: #58a6ff;
  --accent-dark: #1f6feb;
  --green: #1a3a2a;
  --green-text: #3fb950;
  --red: #3d1616;
  --red-text: #f85149;
  --yellow: #3d2e00;
  --yellow-text: #e3b341;
  --blue: #1c2d40;
  --blue-text: #79c0ff;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Auth ── */
#auth-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 40px; width: 100%; max-width: 400px;
}
.auth-card h1 { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
.auth-card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.auth-tab { flex: 1; padding: 8px; background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; transition: all .15s; }
.auth-tab.active { background: var(--accent-dark); color: #fff; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.form-group input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 10px 12px; border-radius: 8px; font-size: 14px; outline: none; transition: border-color .15s;
}
.form-group input:focus { border-color: var(--accent); }
.btn-primary {
  width: 100%; padding: 11px; background: var(--accent-dark); color: #fff;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
  transition: opacity .15s; margin-top: 4px;
}
.btn-primary:hover { opacity: .85; }
.auth-error { color: var(--red-text); font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }

/* ── App Layout ── */
#app { display: none; height: 100vh; flex-direction: column; }
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 16px; height: 52px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
.header-project-select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 5px 10px; border-radius: 8px; font-size: 13px; cursor: pointer; max-width: 160px;
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.user-email { font-size: 12px; color: var(--muted); display: none; }
@media (min-width: 600px) { .user-email { display: block; } }
.btn-icon {
  background: none; border: 1px solid var(--border); color: var(--muted);
  padding: 5px 10px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all .15s;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

/* ── Main ── */
.main-area { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 220px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
}
@media (max-width: 700px) { .sidebar { display: none; } }
.sidebar-section { padding: 16px 12px 8px; }
.sidebar-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; padding: 0 4px; }
.sidebar-item {
  display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 7px;
  font-size: 13px; color: var(--muted); cursor: pointer; transition: all .15s; border: none; background: none; width: 100%; text-align: left;
}
.sidebar-item:hover { background: var(--border); color: var(--text); }
.sidebar-item.active { background: rgba(167,139,250,.15); color: var(--accent); }
.sidebar-item .badge { margin-left: auto; background: var(--border); color: var(--muted); font-size: 10px; padding: 1px 6px; border-radius: 10px; }
.sidebar-project-row {
  display: flex; align-items: center; gap: 4px;
  padding: 8px 12px; border-radius: 8px; cursor: pointer;
  color: var(--muted); font-size: 13px; transition: all .15s;
}
.sidebar-project-row:hover { background: var(--border); color: var(--text); }
.sidebar-project-row.active { background: rgba(167,139,250,.15); color: var(--accent); }
.sidebar-project-row > span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.project-delete-btn {
  background: none; border: none; cursor: pointer; font-size: 14px;
  opacity: 0; padding: 2px 4px; border-radius: 4px; transition: opacity .15s, background .15s;
  flex-shrink: 0;
}
.sidebar-project-row:hover .project-delete-btn { opacity: 1; }
.project-delete-btn:hover { background: rgba(239,68,68,.2); }
.sidebar-add-project {
  margin: 4px 12px 12px; display: flex; align-items: center; gap: 6px;
  padding: 7px 8px; border-radius: 7px; border: 1px dashed var(--border);
  background: none; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; width: calc(100% - 24px);
}
.sidebar-add-project:hover { border-color: var(--accent); color: var(--accent); }

/* ── Content ── */
.content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.content-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.content-title { font-size: 16px; font-weight: 600; }
.content-actions { margin-left: auto; display: flex; gap: 8px; }

/* ── Task List ── */
.task-area { flex: 1; padding: 12px 16px; overflow-y: auto; }
.section-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin: 12px 0 6px; }
.task-list { display: flex; flex-direction: column; gap: 4px; }
.task-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; transition: border-color .15s;
}
.task-card:hover { border-color: #3d4168; }
.task-card.done { opacity: .85; }
.task-card.done .task-title { text-decoration: line-through; color: var(--text); }
.task-card.sub { margin-left: 20px; border-left: 2px solid var(--accent-dark); }
.task-card.parent-node { background: #1a1d2e; border-color: #3d4168; }
.task-card.parent-node .task-title { font-weight: 600; }
.collapse-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 0 4px; flex-shrink: 0; margin-top: 2px; transition: transform .2s; }
.collapse-btn.collapsed { transform: rotate(-90deg); }
.children-group { }
.children-group.collapsed { display: none; }
.task-check {
  width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border);
  background: none; cursor: pointer; flex-shrink: 0; margin-top: 1px; transition: all .15s; display: flex; align-items: center; justify-content: center;
}
.task-check:hover { border-color: var(--accent); }
.task-card.done .task-check { background: var(--green); border-color: var(--green); }
.task-check-inner { width: 8px; height: 8px; border-radius: 50%; background: #fff; display: none; }
.task-card.done .task-check-inner { display: block; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 14px; word-break: break-word; cursor: pointer; border-radius: 4px; padding: 1px 3px; margin: -1px -3px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.task-title.expanded { display: block; -webkit-line-clamp: unset; overflow: visible; }
.task-title:hover { background: rgba(88,166,255,.1); }
.task-title-input { font-size: 14px; background: var(--bg); border: 1px solid var(--accent); color: var(--text); border-radius: 4px; padding: 1px 6px; width: 100%; outline: none; }
.task-expand-btn { font-size: 11px; color: var(--accent); cursor: pointer; margin-top: 2px; display: inline-block; opacity: .8; }
.task-expand-btn:hover { opacity: 1; }
.task-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; align-items: center; }
.tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; }
.tag-assignee { background: var(--blue); color: var(--blue-text); }
.tag-cortex { background: rgba(167,139,250,.2); color: var(--accent); }
.tag-due { background: #1f2937; color: #9ca3af; }
.tag-overdue { background: var(--red); color: var(--red-text); }
.tag-source { background: #1f2937; color: #6b7280; }
.tag-project { background: #1a2a1a; color: #6ee7b7; font-size: 10px; padding: 2px 6px; border-radius: 8px; }
.task-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-sm { padding: 4px 9px; font-size: 11px; border-radius: 6px; border: none; cursor: pointer; transition: opacity .15s; }
.btn-sm:hover { opacity: .8; }
.btn-done { background: var(--green); color: var(--green-text); }
.btn-reopen { background: var(--blue); color: var(--blue-text); }
.btn-delete { background: #1f2937; color: var(--red-text); }
.btn-cortex { background: #1a2a3a; color: #58a6ff; border: 1px solid #1f6feb; }
.empty { text-align: center; color: var(--muted); font-size: 14px; padding: 48px 0; }
.loading { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0; }

/* ── Add Task Form ── */
.add-form {
  border-top: 1px solid var(--border); padding: 12px 16px; background: var(--surface);
  flex-shrink: 0;
}
.add-form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.add-form-row:last-child { margin-bottom: 0; }
.add-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 8px 11px; border-radius: 8px; font-size: 13px; outline: none; transition: border-color .15s;
  font-family: inherit;
}
.add-input:focus { border-color: var(--accent); }
.add-input.narrow { flex: 0 0 120px; }
.date-picker-wrap { position: relative; flex: 0 0 140px; display: flex; align-items: center; }
.date-picker-wrap .add-input { flex: 1; padding-right: 28px; width: 100%; }
.date-picker-icon {
  position: absolute; right: 8px; cursor: pointer; font-size: 14px;
  pointer-events: all; user-select: none; opacity: 0.7;
  transition: opacity .15s;
}
.date-picker-icon:hover { opacity: 1; }
#input-due::-webkit-calendar-picker-indicator { opacity: 0; position: absolute; right: 0; width: 100%; height: 100%; cursor: pointer; }
.add-btn {
  padding: 8px 14px; background: var(--accent-dark); color: #fff;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: opacity .15s; white-space: nowrap;
}
.add-btn:hover { opacity: .85; }
/* モバイル用フィルターバー */
.mobile-filter-bar {
  display: none; gap: 6px; padding: 8px 12px; overflow-x: auto; flex-shrink: 0;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
@media (max-width: 700px) { .mobile-filter-bar { display: flex; } }
.mobile-filter-btn {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: none; color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s;
}
.mobile-filter-btn.active { background: var(--accent-dark); color: #fff; border-color: var(--accent-dark); }
/* モバイルでの入力フォーム3行レイアウト */
@media (max-width: 700px) {
  .add-form-row.pc-only { display: none; }
  .add-form-row.mobile-row2 { display: flex; }
}


/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
  align-items: center; justify-content: center; z-index: 100; padding: 16px;
}
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 100%; max-width: 440px; }
.modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { padding: 8px 16px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; font-size: 13px; cursor: pointer; }
.btn-cancel:hover { border-color: var(--text); color: var(--text); }

/* ── Attachments ── */
.attach-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.attach-item {
  display: flex; align-items: center; gap: 5px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px;
  font-size: 12px; color: var(--muted); max-width: 200px;
}
.attach-item a { color: var(--accent); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.attach-item a:hover { text-decoration: underline; }
.attach-remove { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; font-size: 12px; line-height: 1; }
.attach-remove:hover { color: var(--red-text); }
.attach-upload-label {
  display: inline-flex; align-items: center; gap: 5px; background: none;
  border: 1px solid var(--border); color: var(--muted); padding: 5px 10px;
  border-radius: 8px; font-size: 12px; cursor: pointer; transition: all .15s;
}
.attach-upload-label:hover { border-color: var(--accent); color: var(--accent); }
.task-file-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--muted); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  padding: 9px 18px; border-radius: 8px; font-size: 13px; opacity: 0;
  transition: opacity .2s; pointer-events: none; white-space: nowrap; z-index: 200;
}
.toast.show { opacity: 1; }

/* ── Mobile bottom nav ── */
.mobile-nav {
  display: none; background: var(--surface); border-top: 1px solid var(--border);
  padding: 8px 0 12px; flex-shrink: 0;
}
@media (max-width: 700px) { .mobile-nav { display: flex; } }
.mobile-nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: none; border: none; color: var(--muted); font-size: 10px; cursor: pointer; padding: 4px;
}
.mobile-nav-item.active { color: var(--accent); }
.mobile-nav-icon { font-size: 20px; }

/* ── No project state ── */
.no-project {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--muted); text-align: center; padding: 32px;
}
.no-project h2 { font-size: 18px; color: var(--text); }
.no-project p { font-size: 14px; max-width: 280px; line-height: 1.6; }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>Acta</h1>
    <p>タスクを整理して、チームと共有する</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">ログイン</button>
      <button class="auth-tab" onclick="switchTab('signup')">新規登録</button>
    </div>
    <div id="auth-form">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="auth-password" placeholder="6文字以上" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')submitAuth()">
      </div>
      <button class="btn-primary" onclick="submitAuth()" id="auth-btn">ログイン</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>Acta</h1>
    <select class="header-project-select" id="header-project-select" onchange="selectProject(this.value)">
      <option value="">プロジェクト選択</option>
    </select>
    <button class="btn-icon" id="header-rename-btn" onclick="startRenameProject()" title="プロジェクト名変更" style="display:none">✏️</button>
    <div class="header-right">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn-icon" id="header-delete-project-btn" onclick="deleteCurrentProject()" title="プロジェクトを削除" style="display:none">🗑</button>
      <button class="btn-icon" onclick="showNewProjectModal()">＋</button>
      <button class="btn-icon" onclick="signOut()">ログアウト</button>
    </div>
  </header>

  <div class="main-area">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">ビュー</div>
        <button class="sidebar-item" id="view-all" onclick="setView('all')">
          📋 すべて <span class="badge" id="badge-all">0</span>
        </button>
        <button class="sidebar-item active" id="view-pending" onclick="setView('pending')">
          ○ 未完了 <span class="badge" id="badge-pending">0</span>
        </button>
        <button class="sidebar-item" id="view-done" onclick="setView('done')">
          ✓ 完了
        </button>
        <button class="sidebar-item" id="view-overdue" onclick="setView('overdue')">
          ⚠ 期限切れ <span class="badge" id="badge-overdue">0</span>
        </button>
        <button class="sidebar-item" id="view-mine" onclick="setView('mine')">
          👤 自分宛 <span class="badge" id="badge-mine">0</span>
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">プロジェクト</div>
        <div id="sidebar-projects"></div>
      </div>
      <button class="sidebar-add-project" onclick="showNewProjectModal()">＋ 新しいプロジェクト</button>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="content-header" id="content-header">
        <span class="content-title" id="content-title" onclick="startRenameProjectInline()" style="cursor:pointer" title="クリックで名前変更">プロジェクトを選択</span>
        <div class="content-actions">
          <button class="btn-icon" onclick="loadTasks()">↻</button>
          <button class="btn-icon" id="members-btn" onclick="showMembersModal()" style="display:none">👥 メンバー</button>
        </div>
      </div>

      <div id="task-area" class="task-area">
        <div class="no-project">
          <h2>プロジェクトを選択</h2>
          <p>左のサイドバーからプロジェクトを選ぶか、新しいプロジェクトを作成してください</p>
          <button class="btn-primary" style="width:auto;padding:10px 24px" onclick="showNewProjectModal()">＋ プロジェクト作成</button>
        </div>
      </div>

      <!-- Mobile Filter Bar -->
      <div class="mobile-filter-bar" id="mobile-filter-bar">
        <button class="mobile-filter-btn" id="mf-all" onclick="setView('all')">すべて</button>
        <button class="mobile-filter-btn active" id="mf-pending" onclick="setView('pending')">未完了</button>
        <button class="mobile-filter-btn" id="mf-done" onclick="setView('done')">完了</button>
        <button class="mobile-filter-btn" id="mf-overdue" onclick="setView('overdue')">期限切れ</button>
        <button class="mobile-filter-btn" id="mf-mine" onclick="setView('mine')">自分宛</button>
      </div>

      <!-- Add Task Form -->
      <div class="add-form" id="add-form" style="display:none">
        <!-- 1行目: タスク入力（PC・モバイル共通） -->
        <div class="add-form-row">
          <textarea class="add-input" id="input-title" placeholder="タスクを入力…" rows="2"
            style="font-size:14px;padding:10px 12px;resize:none;line-height:1.4"
            onkeydown="if(event.key==='Enter'&&event.metaKey){addTask();event.preventDefault();}"></textarea>
        </div>
        <!-- 2行目: 担当・締切・追加（PC: タイトルと同行 → モバイル: 2行目） -->
        <div class="add-form-row">
          <select class="add-input narrow" id="input-assignee">
            <option value="">担当者</option>
            <option value="ai:code">⚡ Code</option>
            <option value="ai:cowork">🔄 Cowork</option>
          </select>
          <div class="date-picker-wrap">
            <input class="add-input narrow" id="input-due" type="date" placeholder="締切日">
            <span class="date-picker-icon" onclick="document.getElementById('input-due').showPicker()">📅</span>
          </div>
          <button class="add-btn" onclick="addTask()">追加</button>
        </div>
        <!-- 3行目: 引き継ぎ -->
        <div class="add-form-row">
          <textarea class="add-input" id="input-memo" placeholder="引き継ぎ・コメント（任意）" rows="2" style="resize:none;line-height:1.4"></textarea>
        </div>
      </div>
    </div>

  </div>

  <!-- Mobile Nav -->
  <div class="mobile-nav" style="justify-content:space-around;padding:8px 16px 12px">
    <button class="mobile-nav-item active" onclick="setMobileTab('tasks')">
      <span class="mobile-nav-icon">📋</span>タスク
    </button>
    <button class="mobile-nav-item" onclick="showNewProjectModal()">
      <span class="mobile-nav-icon">＋</span>新規
    </button>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="new-project-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h2>新しいプロジェクト</h2>
    <div class="form-group">
      <label>プロジェクト名</label>
      <input class="add-input" style="width:100%" id="new-project-name" placeholder="プロジェクト名">
    </div>
    <div class="form-group">
      <label>説明（任意）</label>
      <input class="add-input" style="width:100%" id="new-project-desc" placeholder="説明">
    </div>
    <div class="modal-actions">

async function dbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1' + path, {
    ...opts,
    headers: { ...authHeaders(), 'Prefer': 'return=representation', ...(opts.headers || {}) },

  let data = null;
  try { data = JSON.parse(text); } catch(e) {}

}

function saveSession(session) {

}

function loadSession() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s?.access_token || !s?.user) return null;
    return s; // 期限チェックはrefreshで対応
  } catch(e) { return null; }
}

async function refreshSession(session) {
  if (!session?.refresh_token) return null;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ refresh_token: session.refresh_token }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.access_token) return null;
    saveSession(data);
    return data;
  } catch(e) { return null; }
}

// ── AI Memo Parser ────────────────────────────────────────
function parseAiMemo(memo) {
  if (!memo) return { scope: null, handoff: null, escalation: null, reply: false, text: null };
  const lines = memo.split('\n');
  const meta = { scope: null, handoff: null, escalation: null, reply: false };
  const textLines = [];
  let inText = false;
  for (const line of lines) {
    if (line.trim() === '---') { inText = true; continue; }
    if (inText) { textLines.push(line); continue; }
    const match = line.match(/^#(\w+):\s*(.+)$/);
    if (match) {
      const key = match[1].toLowerCase();
      if (['scope', 'handoff', 'escalation'].includes(key)) {
        meta[key] = match[2].trim();
      } else if (key === 'reply') {
        meta.reply = match[2].trim() === 'true';
      } else { textLines.push(line); }
    } else { textLines.push(line); }
  }
  return { ...meta, text: textLines.join('\n').trim() || null };
}

async function checkOverdue() {
  const today = new Date().toISOString().split('T')[0];
  const toMark = allTasks.filter(t => t.status === 'pending' && t.due_date && t.due_date < today);
  for (const t of toMark) {
    await dbUpdate('tasks', 'id=eq.' + t.id, { status: 'overdue' });
    t.status = 'overdue';
  }
}

function renderTasks() {
  const area = document.getElementById('task-area');
  let tasks = allTasks;
  const showProject = currentProject?.id === '__all__';

  if (currentView === 'pending') tasks = tasks.filter(t => t.status === 'pending');
  else if (currentView === 'done') tasks = tasks.filter(t => t.status === 'done');
  else if (currentView === 'overdue') tasks = tasks.filter(t => t.status === 'overdue');
  else if (currentView === 'mine') tasks = tasks.filter(t => t.assignee === currentUser?.email && t.status !== 'done');

  // 完了を下、締切日順にソート
  const sortKey = t => {
    const done = t.status === 'done' ? 1 : 0;
    const due = t.due_date ? t.due_date : '9999-99-99';
    return `${done}_${due}`;
  };
  tasks = [...tasks].sort((a, b) => sortKey(a).localeCompare(sortKey(b)));

  const roots = tasks.filter(t => !t.parent_id);
  const subs = tasks.filter(t => t.parent_id);

  if (roots.length === 0) {
    area.innerHTML = '<div class="empty">タスクがありません<br><small style="color:var(--muted);font-size:12px;margin-top:8px;display:block">下のフォームから追加してください</small></div>';
    return;
  }

  area.innerHTML = roots.map(t => {
    const children = subs.filter(s => s.parent_id === t.id);
    if (children.length > 0) {
      return taskCard(t, false, true, showProject) +
        `<div class="children-group" id="children-${t.id}">` +
        children.map(c => taskCard(c, true, false, showProject)).join('') +
        `</div>`;
    }
    return taskCard(t, false, false, showProject);
  }).join('');

  // タイトルが3行を超えるものに「もっと見る」ボタンを表示
  requestAnimationFrame(() => {
    tasks.forEach(t => {
      const el = document.getElementById('title-' + t.id);
      const btn = document.getElementById('expand-' + t.id);
      if (el && btn) {
        // scrollHeight > clientHeight なら省略されている
        const isClipped = el.scrollHeight > el.clientHeight + 2;
        btn.style.display = isClipped ? 'inline-block' : 'none';
      }
    });
  });
}

function taskCard(t, isSub = false, isParent = false, showProject = false) {
  const done = t.status === 'done';
  const overdue = t.status === 'overdue';
  const dueStr = t.due_date ? new Date(t.due_date).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric' }) : '';

  // メモからファイル情報を解析

  const aiMeta = parseAiMemo(memoWithoutFiles);
  const isAiTask = t.assignee === 'ai:code' || t.assignee === 'ai:cowork';
  const isCodeReply = aiMeta.reply === true;
  const hasEscalation = !!aiMeta.escalation;

  const ac = assigneeColor(t.assignee);
  const cardBg = isCodeReply ? 'background:rgba(88,166,255,0.10);border-left:3px solid var(--accent)' :
    hasEscalation ? 'background:#3d1616' :
    (t.assignee ? `background:${ac.cardBg}` : '');

  // AI担当者ラベル
  const aiLabel = t.assignee === 'ai:code' ? '⚡ Code' : t.assignee === 'ai:cowork' ? '🔄 Cowork' : null;

  return `<div class="task-card ${done ? 'done' : ''} ${isSub ? 'sub' : ''} ${isParent ? 'parent-node' : ''}" id="task-${t.id}" style="${cardBg}">
    <button class="task-check" onclick="toggleTask('${t.id}','${t.status}')">
      <div class="task-check-inner"></div>
    </button>
    ${isParent ? `<button class="collapse-btn" id="collapse-${t.id}" onclick="toggleCollapse('${t.id}')">▼</button>` : ''}
    <div class="task-info" style="min-width:0">
      ${showProject ? `<span class="tag-project">📁 ${esc(projects.find(p => p.id === t.project_id)?.name ?? '')}</span>` : ''}

function toggleTitleExpand(id) {

  if (!el || !btn) return;
  const expanded = el.classList.toggle('expanded');
  btn.textContent = expanded ? '折りたたむ ▲' : 'もっと見る ▼';
}

function startEditTask(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  const titleEl = document.querySelector(`#task-${id} .task-title`);
  if (!titleEl) return;
  const input = document.createElement('input');
  input.className = 'task-title-input';
  input.value = task.title;
  titleEl.replaceWith(input);
  input.focus();
  input.select();
  const save = async () => {
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== task.title) {
      await dbUpdate('tasks', 'id=eq.' + id, { title: newTitle });
      task.title = newTitle;
    }
    renderTasks();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { renderTasks(); }
  });
}

async function toggleTask(id, currentStatus) {
  const newStatus = currentStatus === 'done' ? 'pending' : 'done';
  const { error } = await dbUpdate('tasks', 'id=eq.' + id, { status: newStatus });
  if (error) { toast('エラー: ' + (error.message || JSON.stringify(error))); return; }
  const task = allTasks.find(t => t.id === id);
  if (task) task.status = newStatus;
  const children = allTasks.filter(t => t.parent_id === id);
  if (children.length > 0) {
    await Promise.all(children.map(c => dbUpdate('tasks', 'id=eq.' + c.id, { status: newStatus })));
    children.forEach(c => c.status = newStatus);
  }
  renderTasks();
  updateBadges();
}

async function deleteTask(id) {
  const { error } = await dbDelete('tasks', 'id=eq.' + id);
  if (error) { toast('エラー: ' + (error.message || JSON.stringify(error))); return; }
  allTasks = allTasks.filter(t => t.id !== id);
  renderTasks();
  updateBadges();
  toast('削除しました');
}

async function addTask() {
  if (!currentProject) return;
  const title = document.getElementById('input-title').value.trim();
  if (!title) { document.getElementById('input-title').focus(); return; }

  const assigneeEl = document.getElementById('input-assignee');
  const assignee = assigneeEl.tagName === 'SELECT' ? (assigneeEl.value || null) : (assigneeEl.value.trim() || null);
  const due_date = document.getElementById('input-due').value || null;
  const memo = document.getElementById('input-memo').value.trim() || null;
  const parent_id = null;

  const { data, error } = await dbInsert('tasks', {
    project_id: currentProject.id,
    title, assignee, due_date, memo, parent_id,
    created_by: currentUser.id,
  });

  if (error) { toast('エラー: ' + (error.message || JSON.stringify(error))); return; }
  const newTask = Array.isArray(data) ? data[0] : data;
  if (newTask) allTasks.push(newTask);
  document.getElementById('input-title').value = '';
  if (assigneeEl.tagName === 'SELECT') assigneeEl.value = '';
  else assigneeEl.value = '';
  document.getElementById('input-due').value = '';
  document.getElementById('input-memo').value = '';
  renderTasks();
  updateBadges();
  toast('追加しました');
}

function updateBadges() {
  document.getElementById('badge-all').textContent = allTasks.length;
  document.getElementById('badge-pending').textContent = allTasks.filter(t => t.status === 'pending').length;
  document.getElementById('badge-overdue').textContent = allTasks.filter(t => t.status === 'overdue').length;

// ── File Attachments ──────────────────────────────────────
const FILES_SEPARATOR = '\n__FILES__:';
let _editTaskFiles = []; // current edit modal's pending file list

function parseMemoFiles(memo) {
  if (!memo) return { text: '', files: [] };
  const idx = memo.indexOf(FILES_SEPARATOR);
  if (idx === -1) return { text: memo, files: [] };
  try {
    return { text: memo.slice(0, idx), files: JSON.parse(memo.slice(idx + FILES_SEPARATOR.length).trim()) };
  } catch { return { text: memo, files: [] }; }
}

function buildMemoWithFiles(text, files) {
  const t = (text || '').trim();
  if (!files || files.length === 0) return t || null;
  return (t ? t + '\n' : '') + FILES_SEPARATOR + JSON.stringify(files);
}

function renderAttachList(files) {
  const el = document.getElementById('edit-task-attach-list');
  if (!el) return;
  el.innerHTML = files.map((f, i) => {
    const isImg = /\.(png|jpe?g|gif|webp|svg)$/i.test(f.name);
    return `<div class="attach-item">
      <span>${isImg ? '🖼' : '📄'}</span>
      <a href="${esc(f.url)}" target="_blank" title="${esc(f.name)}">${esc(f.name)}</a>
      <button class="attach-remove" onclick="removeAttachment(${i})" title="削除">✕</button>
    </div>`;
  }).join('');
}

function removeAttachment(idx) {
  _editTaskFiles.splice(idx, 1);
  renderAttachList(_editTaskFiles);
}

async function handleFileSelect(input) {
  if (!input.files.length) return;
  const taskId = document.getElementById('edit-task-id').value;
  if (!taskId) { toast('先にタスクを開いてください'); return; }
  const statusEl = document.getElementById('upload-status');
  for (const file of input.files) {
    statusEl.textContent = `アップロード中: ${file.name}…`;
    try {
      const path = `${taskId}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._\-]/g, '_')}`;
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/task-attachments/${path}`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + (accessToken || SUPABASE_KEY), 'apikey': SUPABASE_KEY, 'Content-Type': file.type || 'application/octet-stream' },
        body: file,
      });
      if (!res.ok) throw new Error((await res.text()).slice(0, 80));
      const url = `${SUPABASE_URL}/storage/v1/object/public/task-attachments/${path}`;
      _editTaskFiles.push({ name: file.name, url, type: file.type, size: file.size });
      renderAttachList(_editTaskFiles);
    } catch (e) { toast(`アップロード失敗: ${e.message}`); }
  }
  statusEl.textContent = '';
  input.value = '';
}

// ── Cortex連携 ────────────────────────────────────────────
const CORTEX_URL = 'http://localhost:3456';

const AGENT_NAMES = {
  frontend: 'UI担当', backend: '開発担当', qa: '品質チェック担当',
  writer: 'ライター', proofreader: '校正担当', sns: 'SNS担当',
  marketing: 'マーケ担当', research: '調査担当', sales: '営業担当',
  infra: 'インフラ担当', security: 'セキュリティ担当', docs: 'ドキュメント担当',
};

function assigneeColor(str) {
  if (!str) return { cardBg: '', tagBg: '#1f2937', tagFg: '#9ca3af' };
  if (str === 'ai:code') return { cardBg: 'rgba(250,204,21,0.12)', tagBg: 'rgba(250,204,21,0.3)', tagFg: '#fde68a' };
  if (str === 'ai:cowork') return { cardBg: 'rgba(52,211,153,0.12)', tagBg: 'rgba(52,211,153,0.3)', tagFg: '#6ee7b7' };
  if (currentUser && str === currentUser.email) {
    return { cardBg: 'rgba(59,130,246,0.22)', tagBg: 'rgba(59,130,246,0.45)', tagFg: '#93c5fd' };
  }
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  const hue = Math.abs(hash) % 360;
  return {
    cardBg: `hsla(${hue},50%,22%,0.8)`,
    tagBg: `hsla(${hue},55%,35%,0.7)`,
    tagFg: `hsl(${hue},80%,82%)`
  };
}

function agentLabel(assignee) {
  if (!assignee) return '';
  if (assignee === 'cortex') return 'Cortex（PM）';
  const id = assignee.replace('agent:', '');
  return AGENT_NAMES[id] ?? id;
}

async function sendToCortex(task) {
  if (!task) return;
  // 担当エージェントの特定（agent:xxx → xxx、cortex → pm）
  const agentId = task.assignee?.startsWith('agent:')
    ? task.assignee.replace('agent:', '')
    : 'pm';

  try {
    const res = await fetch(CORTEX_URL + '/api/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to_agent: agentId,
        project: currentProject?.name ?? 'Acta',
        title: task.title,
        body: [
          task.memo ? task.memo : null,
          `acta_task_id:${task.id}`,
          `acta_project_id:${currentProject?.id}`,
        ].filter(Boolean).join('\n'),
        priority: 'medium',
        from_id: currentUser.email,
      }),
    });
    if (!res.ok) throw new Error('Cortex応答エラー');
    const data = await res.json();
    const memo = (task.memo ? task.memo + '\n' : '') + '[Cortex #' + data.id + ']';
    await dbUpdate('tasks', 'id=eq.' + task.id, { memo });
    task.memo = memo;
    renderTasks();
    toast('Cortexに送信しました（Order #' + data.id + '）');
  } catch(e) {
    toast('Cortex送信エラー: ' + e.message + '（Cortexが起動しているか確認してください）');
  }
}

// ── Polling (リアルタイム更新) ────────────────────────────
let _pollInterval = null;
let _lastTaskCount = 0;
let _lastChatId = null;

async function pollUpdates() {
  if (!currentUser) return;

  // プロジェクト一覧の変化チェック（追加・削除）
  const { data: memberRows } = await dbSelect('project_members', 'select=project_id&user_id=eq.' + currentUser.id);
  const projectIds = (memberRows || []).map(r => r.project_id).sort().join(',');
  if (pollUpdates._lastProjectIds === undefined) { pollUpdates._lastProjectIds = projectIds; }
  else if (projectIds !== pollUpdates._lastProjectIds) {
    pollUpdates._lastProjectIds = projectIds;
    await loadProjects();
  }

  if (!currentProject) return;

  // 全PJモードはポーリング対象外（手動更新）
  if (currentProject.id === '__all__') return;

  // タスク更新チェック（更新・新規追加どちらも検出）
  const { data: tasks } = await dbSelect('tasks', 'select=id,updated_at,created_at&project_id=eq.' + currentProject.id + '&order=updated_at.desc&limit=1');
  const { data: newTasks } = await dbSelect('tasks', 'select=id,created_at&project_id=eq.' + currentProject.id + '&order=created_at.desc&limit=1');
  const latestTime = tasks?.[0]?.updated_at || '';
  const latestCreated = newTasks?.[0]?.created_at || '';
  const key = latestTime + '|' + latestCreated;
  if (!pollUpdates._lastKey) { pollUpdates._lastKey = key; }
  else if (key !== pollUpdates._lastKey) {
    pollUpdates._lastKey = key;
    if (!document.querySelector('.task-title-input')) {
      const { data } = await dbSelect('tasks', 'select=*&project_id=eq.' + currentProject.id + '&order=created_at');
      if (data) { allTasks = data; await checkOverdue(); renderTasks(); updateBadges(); }
    }
  }

  // チャット更新チェック
  const { data: chats } = await dbSelect('chat_messages', 'select=id,created_at,sender_email,content&project_id=eq.' + currentProject.id + '&order=created_at.desc&limit=1');
  if (chats?.length) {
    const latestId = chats[0].id;
    if (!pollUpdates._lastChatId) { pollUpdates._lastChatId = latestId; }
    else if (latestId !== pollUpdates._lastChatId) {
      pollUpdates._lastChatId = latestId;
      appendChatMsg(chats[0]);
    }
  }
}

function startPolling() {
  if (_pollInterval) clearInterval(_pollInterval);
  pollUpdates._lastKey = null;
  pollUpdates._lastChatId = null;
  pollUpdates._lastProjectIds = undefined;
  _pollInterval = setInterval(pollUpdates, 5000);
}

function stopPolling() {
  if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
}
</script>
