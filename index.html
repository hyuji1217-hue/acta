<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Acta</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<meta name="theme-color" content="#FAFBFE">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #EEEFF3;
  --surface: #FAFBFE;
  --border: rgba(30,34,53,.12);
  --border-solid: #E0E2EA;
  --text: #1E2235;
  --muted: #73778c;
  --accent: #2F62C4;
  --accent-dark: #2950A8;
  --accent-light: #E2EAFB;
  --green: #d1fae5;
  --green-text: #065f46;
  --red: #fee2e2;
  --red-text: #dc2626;
  --yellow: #fef3c7;
  --yellow-text: #92400e;
  --blue: #E2EAFB;
  --blue-text: #2950A8;
}
/* html/body の幅を viewport に固定 (子要素の overflow が body を押し広げないように) */
html { max-width: 100%; }
body { font-family: 'Zen Kaku Gothic New', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 100%; }

/* ── Auth ── */
#auth-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
  background: var(--bg);
}
.auth-card {
  background: var(--surface); border: 1px solid var(--border-solid); border-radius: 20px;
  padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 2px 16px rgba(30,34,53,.07);
}
.auth-card h1 { font-family: 'Newsreader', serif; font-size: 28px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
.auth-card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
.auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border-solid); border-radius: 10px; overflow: hidden; }
.auth-tab { flex: 1; padding: 9px; background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer; transition: all .15s; font-family: inherit; }
.auth-tab.active { background: var(--accent); color: #fff; font-weight: 600; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
.form-group input {
  width: 100%; background: var(--bg); border: 1px solid var(--border-solid); color: var(--text);
  padding: 10px 12px; border-radius: 10px; font-size: 14px; outline: none; transition: border-color .15s; font-family: inherit;
}
.form-group input:focus { border-color: var(--accent); }
.btn-primary {
  width: 100%; padding: 11px; background: var(--accent); color: #fff;
  border: none; border-radius: 20px; font-size: 14px; font-weight: 700; cursor: pointer;
  transition: opacity .15s; margin-top: 4px; font-family: inherit;
}
.btn-primary:hover { opacity: .85; }
.auth-error { color: var(--red-text); font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }

/* ── App Layout ── */
#app { display: none; height: 100vh; flex-direction: column; width: 100%; }
header {
  background: var(--surface); border-bottom: 1px solid var(--border-solid);
  padding: 0 22px; height: 66px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
header h1 { font-family: 'Newsreader', serif; font-size: 25px; font-weight: 600; color: var(--accent); letter-spacing: .01em; order: 2; flex: none; }
.header-project-select {
  background: var(--bg); border: 1px solid rgba(30,34,53,.14); color: var(--muted);
  padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; max-width: 160px;
  font-family: inherit; order: 1;
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 11px; order: 3; }
.user-email { font-size: 12.5px; color: var(--muted); display: none; }
@media (min-width: 600px) { .user-email { display: block; } }
.btn-icon {
  background: none; border: 1px solid var(--border-solid); color: var(--muted);
  width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; padding: 0;
}
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }
#header-rename-btn, #header-delete-project-btn, #notif-btn {
  width: auto; border-radius: 20px; padding: 5px 12px; font-size: 12px;
}

/* ── Main ── */
.main-area { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 248px; background: var(--surface); border-right: 1px solid var(--border-solid);
  display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; padding: 16px 12px;
}
@media (max-width: 700px) { .sidebar { display: none; } }
.sidebar-section { padding: 0 0 8px; }
.sidebar-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 400; letter-spacing: .16em; text-transform: uppercase; color: #A0A3B4; margin-bottom: 8px; padding: 0 12px; margin-top: 12px; }
.sidebar-item {
  display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 11px;
  font-size: 13.5px; color: var(--muted); cursor: pointer; transition: all .15s; border: none; background: none; width: 100%; text-align: left; font-family: inherit;
}
.sidebar-item:hover { background: var(--bg); color: var(--text); }
.sidebar-item.active { background: var(--accent-light); color: var(--accent-dark); font-weight: 700; }
.sidebar-item .badge { margin-left: auto; background: var(--bg); color: var(--muted); font-size: 11px; padding: 1px 7px; border-radius: 20px; font-weight: 700; }
.sidebar-item.active .badge { background: var(--accent); color: #fff; }
#badge-notify { background: #dc2626; color: #fff; font-weight: 700; }
#badge-all { display: none; }
.sidebar-project-row {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 9px; cursor: pointer;
  color: var(--muted); font-size: 13.5px; font-weight: 600; transition: all .15s;
}
.sidebar-project-row:hover { background: var(--bg); color: var(--text); }
.sidebar-project-row.active { color: var(--text); }
.sidebar-project-row > span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.project-delete-btn {
  background: none; border: none; cursor: pointer; font-size: 14px;
  opacity: 0; padding: 2px 4px; border-radius: 4px; transition: opacity .15s, background .15s;
  flex-shrink: 0;
}
.sidebar-project-row:hover .project-delete-btn { opacity: 1; }
.project-delete-btn:hover { background: rgba(239,68,68,.15); }
.sidebar-add-project {
  margin: 4px 0 8px; display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 9px; border: 1px dashed rgba(30,34,53,.2);
  background: none; color: var(--muted); font-size: 12.5px; cursor: pointer; transition: all .15s; width: 100%; font-family: inherit;
}
.sidebar-add-project:hover { border-color: var(--accent); color: var(--accent); }

/* ── Content ── */
.content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.content-header { padding: 0 20px; height: 52px; border-bottom: 1px solid var(--border-solid); display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: var(--surface); }
.content-actions { margin-left: auto; display: flex; gap: 8px; }

/* ── Task List ── */
.task-area { flex: 1; padding: 18px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.section-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: #A0A3B4; margin: 8px 0 4px; }
.task-list { display: flex; flex-direction: column; gap: 10px; }
.task-card {
  background: var(--surface); border: 1px solid var(--border-solid);
  border-radius: 14px; padding: 15px 17px; display: flex; flex-direction: column; gap: 0; transition: box-shadow .15s;
}
.task-card:hover { box-shadow: 0 2px 10px rgba(30,34,53,.08); }
.task-card.done { opacity: .6; }
.task-card.overdue { border-left: 3px solid var(--red-text); }
.task-card.done .task-title { text-decoration: line-through; color: var(--muted); }
.task-card.sub { margin-left: 20px; }
.task-card.parent-node { border-left: 3px solid var(--accent); }
.task-card.parent-node .task-title { font-weight: 700; }
.collapse-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 11px; padding: 0 4px; flex-shrink: 0; margin-top: 2px; transition: transform .2s; }
.collapse-btn.collapsed { transform: rotate(-90deg); }
.children-group { }
.children-group.collapsed { display: none; }
.task-check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-solid);
  background: none; cursor: pointer; flex-shrink: 0; margin-top: 1px; transition: all .15s; display: flex; align-items: center; justify-content: center;
}
.task-check:hover { border-color: var(--accent); }
.task-card.done .task-check { background: var(--green); border-color: var(--green-text); }
.task-check-inner { width: 9px; height: 9px; border-radius: 50%; background: var(--green-text); display: none; }
.task-card.done .task-check-inner { display: block; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 16px; font-weight: 700; line-height: 1.45; word-break: break-word; cursor: pointer; border-radius: 4px; padding: 1px 3px; margin: -1px -3px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); }
.task-title.expanded { display: block; -webkit-line-clamp: unset; overflow: visible; }
.task-title:hover { background: var(--accent-light); }
.task-title-input { font-size: 15px; background: var(--bg); border: 1px solid var(--accent); color: var(--text); border-radius: 8px; padding: 4px 8px; width: 100%; outline: none; font-family: inherit; }
.task-expand-btn { font-size: 11px; color: var(--accent); cursor: pointer; margin-top: 2px; display: inline-block; opacity: .8; }
.task-expand-btn:hover { opacity: 1; }
.task-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.tag { font-size: 11px; padding: 2px 9px; border-radius: 6px; font-weight: 600; }
.tag-assignee { background: var(--accent-light); color: var(--accent-dark); }
.tag-cortex { background: var(--accent-light); color: var(--accent-dark); }
.tag-due { background: var(--bg); color: #888CA0; font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 400; }
.tag-overdue { background: var(--red); color: var(--red-text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 400; }
.tag-doing { background: #d1fae5; color: #065f46; font-weight: 700; }
.btn-read { background: var(--accent-light); color: var(--accent-dark); border: 1px solid #C4D6F5; border-radius: 8px; padding: 4px 14px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; }
.btn-read:active { opacity: .7; }
.tag-source { background: var(--bg); color: var(--muted); }
.tag-project { background: var(--accent-light); color: var(--accent-dark); font-size: 10px; padding: 2px 7px; border-radius: 6px; }
.task-actions { display: flex; gap: 4px; flex-shrink: 0; }
.btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 20px; border: none; cursor: pointer; transition: opacity .15s; font-family: inherit; font-weight: 600; }
.btn-delete.btn-sm { width: 22px; height: 22px; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; }
.btn-sm:hover { opacity: .8; }
.btn-done { background: var(--accent-light); color: var(--accent-dark); }
.btn-reopen { background: var(--bg); color: var(--muted); border: 1px solid var(--border-solid); }
.btn-delete { background: var(--red); color: var(--red-text); }
.btn-cortex { background: var(--accent-light); color: var(--accent-dark); border: 1px solid #C4D6F5; }
.empty { text-align: center; color: var(--muted); font-size: 14px; padding: 48px 0; }
.loading { text-align: center; color: var(--muted); font-size: 14px; padding: 32px 0; }

/* ── Product Log Cards ── */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 16px; }
.product-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 16px; display: flex; flex-direction: column; gap: 10px; transition: border-color .15s;
}
.product-card:hover { border-color: #3d4168; }
.product-status {
  display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; letter-spacing: .4px;
}
.status-dev    { background: rgba(250,204,21,.2); color: #fde68a; }
.status-review { background: rgba(59,130,246,.2); color: #93c5fd; }
.status-reject { background: rgba(239,68,68,.2);  color: #fca5a5; }
.status-live   { background: rgba(52,211,153,.2); color: #6ee7b7; }
.status-end    { background: #1f2937; color: #6b7280; }
.product-name { font-size: 16px; font-weight: 700; color: var(--text); }
.product-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.product-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; background: #1f2937; color: var(--muted); }
.product-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
.product-links { display: flex; gap: 8px; margin-top: 4px; }
.product-link {
  font-size: 11px; padding: 4px 10px; border-radius: 8px; border: 1px solid var(--border);
  color: var(--accent); text-decoration: none; transition: border-color .15s;
}
.product-link:hover { border-color: var(--accent); }
.product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
.product-history { font-size: 11px; color: var(--muted); }

/* ── Needs Cards ── */
.needs-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; }
.needs-card-type { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
.needs-card-type.sub { background: rgba(59,130,246,.2); color: #93c5fd; }
.needs-card-type.free { background: rgba(52,211,153,.2); color: #6ee7b7; }
.needs-card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.needs-card-summary { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
.needs-card-footer { display: flex; justify-content: flex-end; gap: 8px; }
.btn-adopt { background: var(--green); color: var(--green-text); padding: 6px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-reject { background: #1f2937; color: var(--muted); padding: 6px 18px; border-radius: 8px; border: none; font-size: 13px; cursor: pointer; }
.btn-adopt:active, .btn-reject:active { opacity: .7; }

/* ── Add Task Form ── */
.add-form {
  border-top: 1px solid var(--border-solid); padding: 14px 20px; background: var(--surface);
  flex-shrink: 0;
}
.add-form-row { display: flex; gap: 8px; margin-bottom: 10px; }
.add-form-row:last-child { margin-bottom: 0; }
/* 入力欄2行目: PCはnowrap1行、スマホはwrap折り返し */
.add-form-row-inputs { flex-wrap: nowrap; gap: 3px; }
@media (max-width: 700px) { .add-form-row-inputs { flex-wrap: wrap; gap: 4px; } }
.add-input {
  flex: 1; background: var(--bg); border: 1px solid rgba(30,34,53,.14); color: var(--text);
  padding: 9px 14px; border-radius: 12px; font-size: 13.5px; outline: none; transition: border-color .15s;
  font-family: inherit;
}
.add-input:focus { border-color: var(--accent); }
.add-input.narrow { flex: 0 0 120px; }
.date-picker-wrap { position: relative; display: flex; align-items: center; }
.date-picker-wrap .add-input { flex: 1; padding-right: 28px; width: 100%; }
.date-picker-icon {
  position: absolute; right: 8px; cursor: pointer; font-size: 14px;
  pointer-events: all; user-select: none; opacity: 0.7;
  transition: opacity .15s;
}
.date-picker-icon:hover { opacity: 1; }
#input-due::-webkit-calendar-picker-indicator { opacity: 0; position: absolute; right: 0; width: 100%; height: 100%; cursor: pointer; }
.add-btn {
  padding: 8px 26px; background: var(--accent); color: #fff;
  border: none; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity .15s; white-space: nowrap; font-family: inherit;
}
.add-btn:hover { opacity: .85; }
/* モバイル用フィルターバー */
.mobile-filter-bar {
  display: none; gap: 4px; padding: 6px 10px; flex-shrink: 0;
  border-top: 1px solid var(--border-solid); background: var(--surface);
}
@media (max-width: 700px) {
  /* font-size:11px+padding縮小で6ボタン全部1行(337px<355px)に収まる。
     flex-wrap:wrapは万一の折り返し保険（overflow-x:autoは廃止） */
  .mobile-filter-bar { display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 10px; }
  .mobile-filter-btn { font-size: 11px; padding: 4px 8px; }
}
.mobile-filter-btn {
  padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-solid);
  background: none; color: var(--muted); font-size: 12px; cursor: pointer; white-space: nowrap; transition: all .15s; flex-shrink: 0; font-family: inherit;
}
.mobile-filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
/* モバイルでの入力フォーム3行レイアウト */
@media (max-width: 700px) {
  .add-form-row.pc-only { display: none; }
  .add-form-row.mobile-row2 { display: flex; }
}
/* [BUG #2 再発防止] スマホ横幅はみ出し防止
   原因①: task-row2がgrid固定幅(22px 110px 110px auto)でoverflow
   原因②: #app { max-width: 100vw } の100vwがスクロールバー幅を含みbodyを超える
   原因③: html/bodyにmax-width制限がなく子要素overflowがbodyを押し広げる
   原因④: mobile-filter-barにpadding-rightがなく🔔通知ボタンが右端で見切れる
   原因⑤: #notif-btnが表示されるとheader内合計幅が375px超
   overflow-x:hidden で隠す対処療法は禁止。レイアウト自体を修正すること。 */
@media (max-width: 700px) {
  /* 100vw→100%: 100vwはスクロールバー幅を含むため環境によりbody幅を超える */
  #app { max-width: 100%; }
  .content { min-width: 0; max-width: 100%; }
  .task-area { padding: 12px 10px; }
  .add-form { padding: 10px 10px; }
  /* add-form-row-inputs の flex-wrap は上の @media ルールで制御（[style*=]セレクタ廃止） */
  .content-tabs { padding: 0 10px; }
  header { padding: 0 12px; gap: 8px; }
  header h1 { font-size: 20px; }
  .header-project-select { max-width: 110px; font-size: 12px; }
  /* header-right: notif-btnが表示されると合計幅が375px超えるためmin-width:0で縮小可能に */
  .header-right { gap: 6px; min-width: 0; overflow: hidden; }
  /* notif-btnはスマホでアイコンのみ表示（"通知オン"テキストを隠す） */
  #notif-btn { padding: 0; width: 30px; height: 30px; border-radius: 50%; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-indent: -9999px; position: relative; }
  #notif-btn::after { content: "🔔"; position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center; text-indent: 0; font-size: 14px; }
  .task-card { padding: 12px 12px; }
  /* 🔔通知ボタンが右端で見切れないようにpadding-rightを確保 */
  .mobile-filter-bar { padding-right: 12px; }
}


/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(30,34,53,.35); display: flex;
  align-items: center; justify-content: center; z-index: 100; padding: 16px;
}
.modal { background: var(--surface); border: 1px solid var(--border-solid); border-radius: 18px; padding: 28px; width: 100%; max-width: 440px; box-shadow: 0 8px 40px rgba(30,34,53,.14); }
#edit-task-modal .modal { max-width: 640px; padding: 32px; }
.modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { padding: 8px 18px; background: var(--bg); border: 1px solid var(--border-solid); color: var(--muted); border-radius: 20px; font-size: 13px; cursor: pointer; font-family: inherit; font-weight: 600; }
.btn-cancel:hover { border-color: var(--text); color: var(--text); }

/* ── Attachments ── */
.attach-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.attach-item {
  display: flex; align-items: center; gap: 5px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px;
  font-size: 12px; color: var(--muted); max-width: 200px;
}
.attach-item a { color: var(--accent); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.attach-item a:hover { text-decoration: underline; }
.attach-remove { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; font-size: 12px; line-height: 1; }
.attach-remove:hover { color: var(--red-text); }
.attach-upload-label {
  display: inline-flex; align-items: center; gap: 5px; background: none;
  border: 1px solid var(--border); color: var(--muted); padding: 5px 10px;
  border-radius: 8px; font-size: 12px; cursor: pointer; transition: all .15s;
}
.attach-upload-label:hover { border-color: var(--accent); color: var(--accent); }
.task-file-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--muted); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: max(20px, env(safe-area-inset-bottom, 20px)); left: 50%; transform: translateX(-50%);
  background: var(--text); color: #fff;
  padding: 9px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0;
  transition: opacity .2s; pointer-events: none; white-space: nowrap; z-index: 200;
  box-shadow: 0 4px 16px rgba(30,34,53,.2);
}
.toast.show { opacity: 1; }

/* ── Content Tabs ── */
.content-tabs {
  display: flex; border-bottom: 1px solid var(--border-solid); flex-shrink: 0; background: var(--surface);
  padding: 0 20px; align-items: center; height: 52px; gap: 4px;
}
.content-tab-btn {
  background: none; border: none;
  color: var(--muted); font-size: 13.5px; font-weight: 600; padding: 7px 18px; cursor: pointer;
  font-family: inherit; transition: all .15s; border-radius: 20px;
}
.content-tab-btn.active { background: var(--accent); color: #fff; font-weight: 700; }

/* ── No project state ── */
.no-project {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; color: var(--muted); text-align: center; padding: 32px;
}
.no-project h2 { font-size: 18px; font-weight: 700; color: var(--text); }
.no-project p { font-size: 14px; max-width: 280px; line-height: 1.6; }

/* ── Time / Recurrence ── */
.time-picker-wrap { position: relative; display: flex; align-items: center; }
.time-picker-wrap .add-input { flex: 1; padding-right: 24px; width: 100%; }
#input-time::-webkit-calendar-picker-indicator,
#edit-task-time::-webkit-calendar-picker-indicator { opacity: 0; position: absolute; right: 0; width: 100%; height: 100%; cursor: pointer; }
.time-picker-icon { position: absolute; right: 6px; cursor: pointer; font-size: 13px; pointer-events: all; user-select: none; opacity: .7; }
.time-picker-icon:hover { opacity: 1; }
.recur-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.tag-recur { background: rgba(52,211,153,.18); color: #6ee7b7; }
.tag-time { background: #1a2a3a; color: #79c0ff; }

/* ── Folder ── */
.folder-group { margin-bottom: 2px; }
.folder-header {
  display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 9px;
  cursor: pointer; color: var(--muted); font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px; transition: all .15s; user-select: none;
  border: none; background: none; width: 100%; text-align: left;
}
.folder-header:hover { background: var(--bg); color: var(--text); }
.folder-caret { font-size: 9px; transition: transform .2s; flex-shrink: 0; color: #A0A3B4; }
.folder-caret.open { transform: rotate(90deg); }
.folder-children { padding-left: 10px; overflow: hidden; }
.folder-children.collapsed { display: none; }
.subfolder-header {
  display: flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 7px;
  cursor: pointer; color: var(--muted); font-size: 12.5px; font-weight: 500;
  transition: all .15s; user-select: none; border: none; background: none; width: 100%; text-align: left;
}
.subfolder-header:hover { background: var(--bg); color: var(--text); }
.subfolder-children { padding-left: 10px; overflow: hidden; }
.subfolder-children.collapsed { display: none; }

/* ── Task List ── */
.task-list { display: flex; flex-direction: column; padding: 0; gap: 10px; }
.task-row1 { display: flex; align-items: flex-start; gap: 13px; }
.task-row2 { display: flex; flex-wrap: wrap; gap: 4px 8px; margin-top: 6px; padding-left: 35px; align-items: center; }
.task-row2 > * { min-width: 0; max-width: 100%; }
.task-row2-dash { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #888CA0; padding: 2px 4px; cursor: pointer; }
.task-card { cursor: default; }

/* ── Memory Panel ── */
.memory-panel {
  width: 320px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border-solid);
  display: flex; flex-direction: column; overflow: hidden;
}
@media (max-width: 1100px) { .memory-panel { display: none; } }
.memory-panel-header {
  padding: 16px 15px 12px; border-bottom: 1px solid var(--border-solid);
  font-family: 'Newsreader', serif; font-size: 17px; font-weight: 600; color: var(--text); flex-shrink: 0;
  display: flex; align-items: center; gap: 8px;
}
.memory-panel-header::after { content: '覚書'; font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 12px; color: #A0A3B4; font-weight: 400; }
.memory-panel-body { flex: 1; overflow-y: auto; padding: 12px 15px; display: flex; flex-direction: column; gap: 10px; }
.mem-section { background: var(--bg); border: 1px solid rgba(30,34,53,.1); border-radius: 12px; padding: 14px; }
.mem-section-title {
  font-size: 12.5px; font-weight: 700; color: var(--accent-dark);
  margin-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline;
}
.mem-content {
  font-size: 12px; color: #3E4250; line-height: 1.85; white-space: pre-wrap;
  word-break: break-word;
}
.mem-empty { font-size: 12px; color: #A0A3B4; font-style: italic; }
.mem-edit-btn {
  font-size: 11px; color: #A0A3B4; background: none; border: none;
  cursor: pointer; padding: 0; transition: color .15s; flex-shrink: 0;
}
.mem-edit-btn:hover { color: var(--accent); }

/* ── Mobile Memory Tab ── */
.mobile-memory-view { display: none; flex: 1; overflow-y: auto; padding: 12px 14px; }
.mobile-memory-view.active { display: block; flex: 1; }

/* ── Product Log Cards ── */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; padding: 16px; }
.product-card {
  background: var(--surface); border: 1px solid var(--border-solid); border-radius: 14px;
  padding: 16px; display: flex; flex-direction: column; gap: 10px; transition: box-shadow .15s;
}
.product-card:hover { box-shadow: 0 2px 12px rgba(30,34,53,.1); }
.product-name { font-size: 16px; font-weight: 700; color: var(--text); }
.product-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
.product-badges { display: flex; gap: 6px; flex-wrap: wrap; }
.product-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--bg); color: var(--muted); font-weight: 600; }
.product-links { display: flex; gap: 8px; margin-top: 4px; }
.product-link { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-solid); color: var(--accent); text-decoration: none; transition: all .15s; font-weight: 600; }
.product-link:hover { background: var(--accent-light); border-color: var(--accent); }
.product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
.product-history { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
.product-status { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: .4px; }
.status-dev    { background: #fef3c7; color: #92400e; }
.status-review { background: var(--accent-light); color: var(--accent-dark); }
.status-reject { background: var(--red); color: var(--red-text); }
.status-live   { background: var(--green); color: var(--green-text); }
.status-end    { background: var(--bg); color: var(--muted); }

/* ── Needs Cards ── */
.needs-card { background: var(--surface); border: 1px solid var(--border-solid); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; }
.needs-card-type { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; display: inline-block; margin-bottom: 10px; }
.needs-card-type.sub { background: var(--accent-light); color: var(--accent-dark); }
.needs-card-type.free { background: var(--green); color: var(--green-text); }
.needs-card-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.needs-card-summary { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
.needs-card-footer { display: flex; justify-content: flex-end; gap: 8px; }
.btn-adopt { background: var(--green); color: var(--green-text); padding: 7px 20px; border-radius: 20px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-reject { background: var(--bg); color: var(--muted); padding: 7px 20px; border-radius: 20px; border: 1px solid var(--border-solid); font-size: 13px; cursor: pointer; font-family: inherit; }
.btn-adopt:active, .btn-reject:active { opacity: .7; }

/* ── Recurrence / Time tags ── */
.tag-recur { background: var(--green); color: var(--green-text); }
.tag-time { background: var(--accent-light); color: var(--accent-dark); }

/* ── Attachments ── */
.attach-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.attach-item { display: flex; align-items: center; gap: 5px; background: var(--bg); border: 1px solid var(--border-solid); border-radius: 8px; padding: 4px 10px; font-size: 12px; color: var(--muted); max-width: 200px; }
.attach-item a { color: var(--accent); text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
.attach-item a:hover { text-decoration: underline; }
.attach-remove { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; font-size: 12px; line-height: 1; }
.attach-remove:hover { color: var(--red-text); }
.attach-upload-label { display: inline-flex; align-items: center; gap: 5px; background: none; border: 1px solid var(--border-solid); color: var(--muted); padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: all .15s; }
.attach-upload-label:hover { border-color: var(--accent); color: var(--accent); }
.task-file-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>Acta</h1>
    <p>タスクを整理して、チームと共有する</p>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">ログイン</button>
      <button class="auth-tab" onclick="switchTab('signup')">新規登録</button>
    </div>
    <div id="auth-form">
      <div class="form-group">
        <label>メールアドレス</label>
        <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>パスワード</label>
        <input type="password" id="auth-password" placeholder="6文字以上" autocomplete="current-password"
          onkeydown="if(event.key==='Enter')submitAuth()">
      </div>
      <button class="btn-primary" onclick="submitAuth()" id="auth-btn">ログイン</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>Acta</h1>
    <select class="header-project-select" id="header-project-select" onchange="selectProject(this.value)">
      <option value="">プロジェクト選択</option>
    </select>
    <button class="btn-icon" id="header-rename-btn" onclick="startRenameProject()" title="プロジェクト名変更" style="display:none">✏️</button>
    <div class="header-right">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn-icon" id="header-delete-project-btn" onclick="deleteCurrentProject()" title="プロジェクトを削除" style="display:none">🗑</button>
      <button class="btn-icon" id="notif-btn" onclick="requestNotifPermission()" style="display:none">🔔 通知オン</button>
      <button class="btn-icon" onclick="showNewProjectModal()">＋</button>
      <button class="btn-icon" onclick="refreshCurrent()" title="リロード">↻</button>
      <button class="btn-icon" onclick="signOut()" title="ログアウト">⏻</button>
    </div>
  </header>

  <div class="main-area">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">ビュー</div>
        <button class="sidebar-item" id="view-mine-global" onclick="loadMineTasks()">
          👤 自分宛 <span class="badge" id="badge-mine">0</span>
        </button>
        <button class="sidebar-item" id="view-all" onclick="setView('all')">
          📋 すべて <span class="badge" id="badge-all">0</span>
        </button>
        <button class="sidebar-item" id="view-pending" onclick="setView('pending')">
          ○ 未完了 <span class="badge" id="badge-pending">0</span>
        </button>
        <button class="sidebar-item" id="view-done" onclick="setView('done')">
          ✓ 完了
        </button>
        <button class="sidebar-item" id="view-overdue" onclick="setView('overdue')">
          ⚠ 期限切れ <span class="badge" id="badge-overdue">0</span>
        </button>
        <button class="sidebar-item" id="view-notify" onclick="loadNotifyTasks()">
          🔔 通知 <span class="badge" id="badge-notify">0</span>
        </button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-label">プロジェクト</div>
        <div id="sidebar-projects"></div>
      </div>
      <button class="sidebar-add-project" onclick="showNewProjectModal()">＋ 新しいプロジェクト</button>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="content-header" id="content-header" style="display:none">
        <div class="content-actions">
          <button class="btn-icon" id="members-btn" onclick="showMembersModal()" style="display:none">👥 メンバー</button>
        </div>
      </div>

      <!-- Content Tabs (mobile only, top) -->
      <div class="content-tabs">
        <button class="content-tab-btn active" id="mob-tab-tasks" onclick="setMobileTab('tasks')">📋 タスク</button>
        <button class="content-tab-btn" id="mob-tab-memory" onclick="setMobileTab('memory')">📒 メモリー</button>
      </div>

      <!-- Mobile Filter Bar: タブ直下に固定 (位置ずれ防止) -->
      <div class="mobile-filter-bar" id="mobile-filter-bar">
        <button class="mobile-filter-btn active" id="mf-mine" onclick="loadMineTasks()">👤 自分宛</button>
        <button class="mobile-filter-btn" id="mf-all" onclick="setView('all')">すべて</button>
        <button class="mobile-filter-btn" id="mf-pending" onclick="setView('pending')">未完了</button>
        <button class="mobile-filter-btn" id="mf-done" onclick="setView('done')">完了</button>
        <button class="mobile-filter-btn" id="mf-overdue" onclick="setView('overdue')">期限切れ</button>
        <button class="mobile-filter-btn" id="mf-notify" onclick="loadNotifyTasks()">🔔 通知<span id="badge-notify-mobile" style="display:none;margin-left:3px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px;vertical-align:middle"></span></button>
      </div>

      <div id="task-area" class="task-area">
        <div class="no-project">
          <h2>プロジェクトを選択</h2>
          <p>左のサイドバーからプロジェクトを選んでください</p>
          <button class="btn-primary" style="width:auto;padding:10px 24px" onclick="showNewProjectModal()">＋ プロジェクト作成</button>
        </div>
      </div>

      <!-- Mobile Memory View -->
      <div class="mobile-memory-view" id="mobile-memory-view"></div>

      <!-- Add Task Form -->
      <div class="add-form" id="add-form" style="display:none">
        <!-- 1行目: タスク入力（PC・モバイル共通） -->
        <div class="add-form-row">
          <textarea class="add-input" id="input-title" placeholder="タスクを入力…" rows="2"
            style="font-size:14px;padding:10px 12px;resize:none;line-height:1.4"
            onkeydown="if(event.key==='Enter'&&event.metaKey){addTask();event.preventDefault();}"></textarea>
        </div>
        <!-- 2行目: 担当・締切・時間・繰り返し・追加（1行） -->
        <div class="add-form-row add-form-row-inputs">
          <div style="position:relative;flex:0 0 62px;min-width:0" id="assignee-picker-wrap">
            <button type="button" class="add-input narrow" id="assignee-picker-btn"
              onclick="toggleAssigneePicker()"
              style="width:100%;font-size:11px;padding:8px 2px;text-align:left;cursor:pointer;white-space:nowrap;overflow:hidden">担当者</button>
            <input type="hidden" id="input-assignee" value="">
            <div id="assignee-picker-menu" style="display:none;position:absolute;left:0;background:var(--surface);border:1px solid var(--border);border-radius:8px;z-index:999;min-width:90px;overflow:hidden"></div>
          </div>
          <div class="date-picker-wrap" style="flex:0 0 92px;min-width:0">
            <input class="add-input" id="input-due" type="date" placeholder="日付" style="width:100%;padding-right:22px;font-size:11px;padding-left:4px">
            <span class="date-picker-icon" onclick="document.getElementById('input-due').showPicker()">📅</span>
          </div>
          <div class="time-picker-wrap" style="flex:0 0 60px;min-width:0">
            <input class="add-input" id="input-time" type="time" placeholder="時間" style="width:100%;font-size:11px;padding-left:2px;padding-right:18px">
            <span class="time-picker-icon" onclick="document.getElementById('input-time').showPicker()">🕐</span>
          </div>
          <select class="add-input" id="input-recur-type" style="flex:0 0 52px;min-width:0;font-size:11px;padding:8px 2px" onchange="toggleRecurInterval('add')">
            <option value="">🔁</option>
            <option value="daily">毎日</option>
            <option value="weekly">毎週</option>
          </select>
          <span id="add-recur-interval-wrap" style="display:none;align-items:center;gap:2px;flex-shrink:0">
            <input class="add-input" id="input-recur-interval" type="number" min="1" max="99" value="1" style="width:36px;text-align:center;padding:8px 2px;font-size:11px">
            <span id="add-recur-unit" style="font-size:10px;color:var(--muted);white-space:nowrap">日</span>
          </span>
          <button class="add-btn" onclick="addTask()" style="flex-shrink:0;padding:8px 10px;font-size:12px">追加</button>
        </div>
        <!-- 4行目: 引き継ぎ -->
        <div class="add-form-row">
          <textarea class="add-input" id="input-memo" placeholder="引き継ぎ・コメント（任意）" rows="2" style="resize:none;line-height:1.4"></textarea>
        </div>
      </div>
    </div>

    <!-- Memory Panel (PC full screen) -->
    <div class="memory-panel" id="memory-panel">
      <div class="memory-panel-header">📒 メモリー</div>
      <div class="memory-panel-body" id="memory-panel-body">
        <div class="mem-empty">プロジェクトを選択するとメモリーが表示されます</div>
      </div>
    </div>

  </div>

</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="new-project-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h2>新しいプロジェクト</h2>
    <div class="form-group">
      <label>プロジェクト名</label>
      <input class="add-input" style="width:100%" id="new-project-name" placeholder="プロジェクト名">
    </div>
    <div class="form-group">
      <label>説明（任意）</label>
      <input class="add-input" style="width:100%" id="new-project-desc" placeholder="説明">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('new-project-modal').style.display='none'">キャンセル</button>
      <button class="btn-primary" style="width:auto;margin-top:0" onclick="createProject()">作成</button>
    </div>
  </div>
</div>

<!-- Members Modal -->
<div class="modal-overlay" id="members-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">
    <h2>👥 メンバー管理</h2>
    <div id="members-list" style="margin-bottom:16px;display:flex;flex-direction:column;gap:8px"></div>
    <div class="form-group">
      <label>メンバーを追加</label>
      <div style="display:flex;gap:8px">
        <input class="add-input" style="flex:1" id="invite-email" placeholder="メールアドレス">
        <button class="add-btn" onclick="inviteMember()">追加</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('members-modal').style.display='none'">閉じる</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirm-modal" style="display:none">
  <div class="modal" style="max-width:360px">
    <h2 id="confirm-title">確認</h2>
    <p id="confirm-message" style="color:var(--muted);font-size:14px;margin:12px 0 20px"></p>
    <div class="modal-actions">
      <button class="btn-cancel" id="confirm-cancel">キャンセル</button>
      <button class="btn-primary" id="confirm-ok" style="width:auto;background:var(--red-text);color:#000">削除</button>
    </div>
  </div>
</div>

<!-- Rename Project Modal -->
<div class="modal-overlay" id="rename-project-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal" style="max-width:360px">
    <h2>プロジェクト名変更</h2>
    <div class="form-group">
      <input class="add-input" style="width:100%" id="rename-project-input" placeholder="プロジェクト名"
        onkeydown="if(event.key==='Enter'){event.preventDefault();submitRenameProject();}if(event.key==='Escape')document.getElementById('rename-project-modal').style.display='none'">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('rename-project-modal').style.display='none'">キャンセル</button>
      <button class="btn-primary" style="width:auto;margin-top:0" onclick="submitRenameProject()">変更</button>
    </div>
  </div>
</div>

<!-- Edit Task Modal -->
<div class="modal-overlay" id="edit-task-modal" style="display:none" onclick="if(event.target===this)this.style.display='none'">
  <div class="modal">

// ── Memo metadata (time/recurrence stored in memo field) ──
const META_SEP = '\n__ACTA_META__:';
const FILES_SEP = '\n__FILES__:';

function parseMemoAll(memo) {
  if (!memo) return { text: '', meta: null, files: [] };
  let base = memo, filesJson = '';
  const fi = memo.indexOf(FILES_SEP);
  if (fi !== -1) { base = memo.slice(0, fi); filesJson = memo.slice(fi + FILES_SEP.length); }
  let text = base, metaJson = '';
  const mi = base.indexOf(META_SEP);
  if (mi !== -1) { text = base.slice(0, mi); metaJson = base.slice(mi + META_SEP.length).trim(); }
  let meta = null, files = [];
  try { if (metaJson) meta = JSON.parse(metaJson); } catch {}
  try { if (filesJson) files = JSON.parse(filesJson.trim()); } catch {}
  return { text, meta, files };
}

function buildMemoAll(text, meta, files) {
  let s = (text || '').trim();
  const hasMeta = meta && (meta.t || meta.r);
  if (hasMeta) s += META_SEP + JSON.stringify(meta);
  if (files && files.length > 0) s += FILES_SEP + JSON.stringify(files);
  return s || null;
}

function calcNextDate(due_date, recur) {
  const d = new Date(due_date + 'T12:00:00');
  if (recur.type === 'daily') d.setDate(d.getDate() + (recur.n || 1));
  else if (recur.type === 'weekly') d.setDate(d.getDate() + (recur.n || 1) * 7);
  return d.toISOString().split('T')[0];
}

function urlBase64ToUint8Array(b64) {
  const p = '='.repeat((4 - b64.length % 4) % 4);
  const s = (b64 + p).replace(/-/g, '+').replace(/_/g, '/');
  return new Uint8Array([...atob(s)].map(c => c.charCodeAt(0)));
}

async function setupPWA() {
  if (!('serviceWorker' in navigator)) return;
  try { await navigator.serviceWorker.register('/sw.js'); } catch (e) { console.warn('[Acta] SW:', e.message); }
  const btn = document.getElementById('notif-btn');
  if (!('Notification' in window) || !('PushManager' in window)) return; // 非対応ブラウザ
  if (Notification.permission === 'granted') {
    if (btn) btn.style.display = 'none';
    await subscribePush();
  } else {
    if (btn) btn.style.display = ''; // 常に表示
  }
}

async function requestNotifPermission() {
  const btn = document.getElementById('notif-btn');
  if (!('Notification' in window)) { toast('このブラウザは通知非対応です'); return; }
  try {

    if (perm === 'granted') {
      if (btn) btn.style.display = 'none';

}

async function subscribePush() {
  if (!('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;

    if (!sub) {
      sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });

    const subJson = JSON.stringify(sub.toJSON());

// ── HTTP helpers ──────────────────────────────────────────
function authHeaders() {
  return {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + (accessToken || SUPABASE_KEY),
  };
}

function isAccessTokenExpired() {
  if (!accessToken) return true;
  try {
    const payload = JSON.parse(atob(accessToken.split('.')[1]));
    return payload.exp && payload.exp < Math.floor(Date.now() / 1000) + 60;
  } catch(e) { return false; }
}

async function dbFetch(path, opts = {}) {
  // リクエスト前にトークン期限を確認して事前リフレッシュ
  if (isAccessTokenExpired()) {
    const session = loadSession();
    const refreshed = session ? await refreshSession(session) : null;
    if (refreshed) {
      accessToken = refreshed.access_token;
    } else if (session) {
      signOut();
      return { data: null, error: { message: 'セッションが期限切れです。再ログインしてください。' } };
    }
  }
  const doFetch = () => fetch(SUPABASE_URL + '/rest/v1' + path, {
    ...opts,
    cache: 'no-store',
    headers: { ...authHeaders(), 'Prefer': 'return=representation', ...(opts.headers || {}) },
  });
  let res = await doFetch();
  // 401: 念のため1回リフレッシュ再試行
  if (res.status === 401) {
    const session = loadSession();
    const refreshed = session ? await refreshSession(session) : null;
    if (refreshed) {
      accessToken = refreshed.access_token;
      res = await doFetch();
    } else {
      signOut();
      return { data: null, error: { message: 'セッションが期限切れです。再ログインしてください。' } };
    }
  }
  const text = await res.text();
  let data = null;
  try { data = JSON.parse(text); } catch(e) {}
  if (!res.ok) return { data: null, error: data || { message: text } };
  return { data, error: null };
}

// ── Session ───────────────────────────────────────────────
function saveSession(session) {
  localStorage.setItem(AUTH_KEY, JSON.stringify(session));
}

function clearSession() {
  localStorage.removeItem(AUTH_KEY);
}

function loadSession() {
  try {
    const raw = localStorage.getItem(AUTH_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s?.access_token || !s?.user) return null;
    return s; // 期限チェックはrefreshで対応
  } catch(e) { return null; }
}

async function refreshSession(session) {
  if (!session?.refresh_token) return null;
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ refresh_token: session.refresh_token }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.access_token) return null;
    saveSession(data);
    return data;
  } catch(e) { return null; }
}

function showApp(session) {
  currentUser = session.user;
  accessToken = session.access_token;
  document.getElementById('auth-screen').style.display = 'none';
  const appEl = document.getElementById('app');
  appEl.style.display = 'flex';
  document.getElementById('user-email-display').textContent = currentUser.email;

}

function showLogin() {

  accessToken = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// Init on page load
(async function init() {
  let session = loadSession();
  if (session) {
    // トークンが期限切れまたは5分以内に切れる場合はリフレッシュ
    const expiringSoon = session.expires_at && session.expires_at < Math.floor(Date.now() / 1000) + 300;
    if (expiringSoon) {
      const refreshed = await refreshSession(session);
      session = refreshed ?? session;
      if (!refreshed) { showLogin(); return; }
    }
    showApp(session);
    setupPWA();
    // バックグラウンドで定期リフレッシュ（30分ごと）
    setInterval(async () => {
      const s = loadSession();
      if (s) { const r = await refreshSession(s); if (r) { accessToken = r.access_token; } }
    }, 30 * 60 * 1000);
  } else {
    showLogin();
  }
})();

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState !== 'visible') return;
  navigator.serviceWorker?.ready.then(reg =>
    reg.getNotifications().then(notifs => notifs.forEach(n => n.close()))
  ).catch(() => {});
  // フォアグラウンド復帰時にトークンを更新（iOSスリープ後の期限切れ対策）
  if (currentUser) {
    const session = loadSession();
    if (session) {
      const expiringSoon = !session.expires_at || session.expires_at < Math.floor(Date.now() / 1000) + 300;
      if (expiringSoon) {
        const refreshed = await refreshSession(session);
        if (refreshed) { accessToken = refreshed.access_token; }
        else { showLogin(); }
      }
    }
  }
});

// ── Auth ──────────────────────────────────────────────────
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (mode === 'login')));
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'ログイン' : '新規登録';

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'メールアドレスとパスワードを入力してください'; return; }

  const btn = document.getElementById('auth-btn');
  btn.disabled = true; btn.textContent = '処理中…';

  try {
    if (authMode === 'login') {
      const res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.style.color = 'var(--red-text)'; errEl.textContent = data.error_description || data.msg || 'ログインエラー'; }
      else { saveSession(data); showApp(data); }
    } else {
      const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) { errEl.style.color = 'var(--red-text)'; errEl.textContent = data.error_description || data.msg || '登録エラー'; }
      else if (data.access_token) { saveSession(data); showApp(data); }
      else { errEl.style.color = 'var(--green-text)'; errEl.textContent = '確認メールを送信しました。'; }
    }
  } catch(e) { errEl.style.color = 'var(--red-text)'; errEl.textContent = e.message; }
  btn.disabled = false; btn.textContent = authMode === 'login' ? 'ログイン' : '新規登録';
}

function signOut() {
  clearSession();
  showLogin();
}

function renderSidebar() {
  const el = document.getElementById('sidebar-projects');

  const inbox = projects.find(p => p.id === INBOX_ID);
  const rest  = projects.filter(p => p.id !== INBOX_ID);

  // descriptionから __f:フォルダ/サブ| を解析してグループ化
  const topMap = {}; // { トップ名: { サブ名: [project,...] } }
  const noFolder = [];
  for (const p of rest) {
    const m = (p.description || '').match(/^__f:([^|/]+)(?:\/([^|]+))?/);
    if (m) {
      const top = m[1], sub = m[2] || '_root';
      if (!topMap[top]) topMap[top] = {};
      if (!topMap[top][sub]) topMap[top][sub] = [];
      topMap[top][sub].push(p);
    } else {
      noFolder.push(p);
    }
  }
  // フォルダに属さないプロジェクトはトップレベルにそのまま表示（「その他」には入れない）

  function projectRow(p) {
    const active = currentProject?.id === p.id;
    return `<div class="sidebar-project-row ${active ? 'active' : ''}" onclick="selectProject('${p.id}')">
      <span>${esc(p.name)}</span>
      <button class="project-delete-btn" onclick="event.stopPropagation();deleteProject('${p.id}','${esc(p.name)}')" title="削除">🗑</button>
    </div>`;
  }

  function folderBlock(topName, subs) {
    const allProjs = Object.values(subs).flat();
    const topKey = 'top_' + topName;
    if (!(topKey in _folderOpen)) _folderOpen[topKey] = false;
    const topOpen = _folderOpen[topKey];

    const subHtml = Object.entries(subs).map(([subName, projs]) => {
      if (subName === '_root') return projs.map(projectRow).join('');
      const subKey = 'sub_' + topName + '_' + subName;
      if (!(subKey in _folderOpen)) _folderOpen[subKey] = false;
      const subOpen = _folderOpen[subKey];
      return `<div class="folder-group">
        <button class="subfolder-header" onclick="toggleFolder('${subKey}')">
          <span class="folder-caret ${subOpen ? 'open' : ''}">▶</span>${esc(subName)}
        </button>
        <div class="subfolder-children ${subOpen ? '' : 'collapsed'}" id="fc-${subKey}">
          ${projs.map(projectRow).join('')}
        </div>
      </div>`;
    }).join('');

    return `<div class="folder-group">
      <button class="folder-header" onclick="toggleFolder('${topKey}')">
        <span class="folder-caret ${topOpen ? 'open' : ''}">▶</span>${esc(topName)}
      </button>
      <div class="folder-children ${topOpen ? '' : 'collapsed'}" id="fc-${topKey}">
        ${subHtml}
      </div>
    </div>`;
  }

  // FOLDER_CONFIGをベースに構造を構築（空サブフォルダも表示）
  const mergedTopMap = {};
  for (const { top, subs } of FOLDER_CONFIG) {
    mergedTopMap[top] = {};
    for (const sub of subs) mergedTopMap[top][sub] = [];
    // 実際のプロジェクトをマージ
    if (topMap[top]) {
      for (const [sub, projs] of Object.entries(topMap[top])) {
        if (!mergedTopMap[top][sub]) mergedTopMap[top][sub] = [];
        mergedTopMap[top][sub].push(...projs);
      }
    }
  }
  // FOLDER_CONFIGにないトップフォルダはそのまま追加
  for (const [top, subs] of Object.entries(topMap)) {
    if (!mergedTopMap[top]) mergedTopMap[top] = subs;
  }

  let html = '';
  if (inbox) {
    html += `<div class="sidebar-project-row ${currentProject?.id === inbox.id ? 'active' : ''}" onclick="selectProject('${inbox.id}')">
      <span>📥 ${esc(inbox.name)}</span>
      <button class="project-delete-btn" onclick="event.stopPropagation();deleteProject('${inbox.id}','${esc(inbox.name)}')" title="削除">🗑</button>
    </div>`;
  }
  for (const [topName, subs] of Object.entries(mergedTopMap)) {
    html += folderBlock(topName, subs);
  }
  // フォルダに属さないプロジェクトをトップレベルに表示
  for (const p of noFolder) {
    html += projectRow(p);
  }

  el.innerHTML = html;
}

function showConfirm(title, message) {
  return new Promise(resolve => {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-message').textContent = message;
    const modal = document.getElementById('confirm-modal');
    modal.style.display = 'flex';
    const ok = document.getElementById('confirm-ok');
    const cancel = document.getElementById('confirm-cancel');
    const cleanup = (result) => {
      modal.style.display = 'none';
      ok.removeEventListener('click', onOk);
      cancel.removeEventListener('click', onCancel);
      resolve(result);
    };
    const onOk = () => cleanup(true);
    const onCancel = () => cleanup(false);
    ok.addEventListener('click', onOk);
    cancel.addEventListener('click', onCancel);
  });
}

// ── AI Memo Parser ────────────────────────────────────────
function parseAiMemo(memo) {
  if (!memo) return { scope: null, handoff: null, escalation: null, reply: false, text: null };
  const lines = memo.split('\n');
  const meta = { scope: null, handoff: null, escalation: null, reply: false };
  const textLines = [];
  let inText = false;
  for (const line of lines) {
    if (line.trim() === '---') { inText = true; continue; }
    if (inText) { textLines.push(line); continue; }
    const match = line.match(/^#(\w+):\s*(.+)$/);
    if (match) {
      const key = match[1].toLowerCase();
      if (['scope', 'handoff', 'escalation'].includes(key)) {
        meta[key] = match[2].trim();
      } else if (key === 'reply') {
        meta.reply = match[2].trim() === 'true';
      } else { textLines.push(line); }
    } else { textLines.push(line); }
  }
  return { ...meta, text: textLines.join('\n').trim() || null };
}

async function checkOverdue() {
  const jstNow = new Date(Date.now() + 9 * 60 * 60 * 1000);
  const today = jstNow.toISOString().split('T')[0]; // JST offset済みなのでUTC日付 = JST日付
  const currentTime = `${String(jstNow.getUTCHours()).padStart(2,'0')}:${String(jstNow.getUTCMinutes()).padStart(2,'0')}`;

  const toMark = allTasks.filter(t => {
    if (t.status !== 'pending' || !t.due_date) return false;
    if (t.due_date < today) return true;
    if (t.due_date === today) {
      const { meta } = parseMemoAll(t.memo);
      return meta?.t && meta.t <= currentTime;
    }
    return false;
  });

  for (const t of toMark) {
    const { text: memoText, meta } = parseMemoAll(t.memo);
    if (meta?.r?.type) {
      // 繰り返しタスク: overdueにせず次のインスタンスを作成してdoneに
      const nextDate = calcNextDate(t.due_date, meta.r);
      await dbUpdate('tasks', 'id=eq.' + t.id, { status: 'done' });
      t.status = 'done';
      await dbInsert('tasks', {
        project_id: t.project_id,
        title: t.title,
        assignee: t.assignee,
        due_date: nextDate,
        memo: t.memo,
        created_by: t.created_by,
      });
    } else {
      await dbUpdate('tasks', 'id=eq.' + t.id, { status: 'overdue' });
      t.status = 'overdue';
    }
  }
}

function parseProductMemo(memo = '') {
  const lines = memo.split('\n');
  const badges = [];
  let desc = '', storeUrl = '', codeUrl = '', lastUpdate = '';
  for (const line of lines) {
    if (/^📱|^🌐|^💰|^🔄/.test(line)) { badges.push(...line.split(/\s{2,}/).filter(Boolean)); continue; }
    if (line.startsWith('📝 説明')) continue;
    if (line.startsWith('🔗 App Store:')) { storeUrl = line.replace('🔗 App Store:', '').trim(); continue; }
    if (line.startsWith('📁 コード:')) { codeUrl = line.replace('📁 コード:', '').trim(); continue; }
    if (line.match(/^\d{4}-\d{2}-\d{2}/)) { lastUpdate = line; continue; }
    if (!line.startsWith('##') && !line.startsWith('---') && line.trim() && !desc) desc = line.trim();
  }
  return { badges, desc, storeUrl, codeUrl, lastUpdate };
}

function renderTasks() {
  const area = document.getElementById('task-area');

  // 通知ビュー
  if (globalNotifyView) {
    if (allTasks.length === 0) { area.innerHTML = '<div class="empty">新しい通知はありません</div>'; return; }
    area.innerHTML = '<div class="task-list">' + allTasks.map(t => notifyCard(t)).join('') + '</div>';
    return;
  }

  // ニーズ探し専用レンダリング
  if (currentProject?.id === NEEDS_SCOUT_ID) {
    const needsTasks = allTasks.filter(t => !isMemTask(t) && t.status !== 'done' && t.assignee !== 'ai:code');
    if (needsTasks.length === 0) { area.innerHTML = '<div class="empty">候補がありません</div>'; return; }
    area.innerHTML = '<div style="padding:8px 0">' + needsTasks.map(t => needsCard(t)).join('') + '</div>';
    return;
  }

  // メモリータスク・PUSH_SUB・通知専用タスクを除外
  let tasks = allTasks.filter(t => !isMemTask(t) && t.title !== '__PUSH_SUB__' && !isNotifyTask(t));

  // ビューフィルター
  if (currentView === 'done') tasks = tasks.filter(t => t.status === 'done');
  else if (currentView === 'overdue') tasks = tasks.filter(t => t.status === 'overdue');
  else if (currentView === 'pending') tasks = tasks.filter(t => t.status === 'pending' || t.status === 'overdue');
  else if (currentView === 'all') { /* 全件表示・フィルターなし */ }
  else if (globalMineView || currentView === 'mine') {
    // [BUG FIX] assigneeフィルタ必須。以前はstatus!='done'のみで、他者タスクが漏れていた。
    // loadMineTasks()がDBでassignee=eq.emailフィルタ済みでも、pollUpdates()やselectProject()後の
    // renderTasks()再描画でallTasksが全員分になることがある。二重フィルタで確実に自分宛のみ表示。
    tasks = tasks.filter(t => t.status !== 'done' && t.assignee === currentUser?.email);
  }

  // 期限順ソート（完了は下）
  const sortKey = t => {
    const done = t.status === 'done' ? 1 : 0;
    const due = t.due_date ?? '9999-99-99';
    const { meta } = parseMemoAll(t.memo);
    const time = meta?.t ?? '99:99';
    return `${done}_${due}_${time}`;
  };
  tasks = [...tasks].sort((a, b) => sortKey(a).localeCompare(sortKey(b)));

  if (tasks.length === 0) {
    area.innerHTML = '<div class="empty">タスクがありません<br><small style="color:var(--muted);font-size:12px;margin-top:8px;display:block">下のフォームから追加してください</small></div>';
    return;
  }

  if (globalMineView) {
    const html = tasks.map(t => {
      if (t.project_id === NEEDS_SCOUT_ID) return needsCard(t);
      if (t.project_id === PRODUCT_LOG_ID) return productCard(t);
      return taskCard(t);
    }).join('');
    area.innerHTML = `<div class="task-list">${html}</div>`;
    return;
  }

  area.innerHTML = `<div class="task-list">${tasks.map(t => taskCard(t)).join('')}</div>`;
}

      ${recurLabel
        ? `<span class="tag tag-recur" style="cursor:pointer" onclick="event.stopPropagation();inlineEditRecur('${t.id}')">${recurLabel}</span>`
        : `<span class="task-row2-dash" onclick="event.stopPropagation();inlineEditRecur('${t.id}')">—</span>`}
    </div>

      ? `<div style="padding:4px 8px 6px 26px">

}

function toggleMemoExpand(id) {
  const memoArea = document.getElementById('memo-' + id);
  const btn = document.getElementById('expand-' + id);
  if (!memoArea || !btn) return;
  const shown = memoArea.style.display !== 'none';
  const titleEl = document.getElementById('title-' + id);
  if (shown) {
    memoArea.style.display = 'none';
    btn.textContent = '▼';
    _isInlineEditing = false;
    if (titleEl) titleEl.classList.remove('expanded');
  } else {
    const task = allTasks.find(t => t.id === id);
    const { text } = parseMemoAll(task?.memo);
    memoArea.innerHTML = '';
    memoArea.style.cssText = 'display:block;padding:4px 8px 4px 26px';

    // タイトルを展開（clampを解除）
    if (titleEl) titleEl.classList.add('expanded');

    const ta = document.createElement('textarea');
    ta.value = text?.trim() || '';
    ta.style.cssText = 'width:100%;background:transparent;border:none;border-top:1px solid rgba(30,34,53,0.1);color:var(--text);padding:6px 0;font-size:13px;line-height:1.6;resize:none;outline:none;font-family:inherit;display:block;overflow:hidden';
    ta.addEventListener('click', e => e.stopPropagation());
    ta.addEventListener('focus', () => { _isInlineEditing = true; });
    ta.addEventListener('blur', async () => {
      _isInlineEditing = false;
      const t2 = allTasks.find(t => t.id === id);
      if (!t2) return;
      const { meta, files } = parseMemoAll(t2.memo);
      const newMemo = buildMemoAll(ta.value, meta, files);
      if (newMemo !== t2.memo) { t2.memo = newMemo; await dbUpdate('tasks', 'id=eq.' + id, { memo: newMemo }); }
    });
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    });
    memoArea.appendChild(ta);
    btn.textContent = '▲';
    setTimeout(() => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }, 0);
  }
}

function inlineEditDue(id) {
  const card = document.getElementById('task-' + id);
  if (!card) return;
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  const row2 = card.querySelector('.task-row2');
  if (!row2) return;
  const { text: memoText, meta, files } = parseMemoAll(task.memo);
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:2px';
  wrap.addEventListener('click', e => e.stopPropagation());
  const dateInput = document.createElement('input');
  dateInput.type = 'date';
  dateInput.value = task.due_date || '';
  dateInput.style.cssText = 'font-size:10px;padding:2px;border-radius:4px;background:var(--bg);border:1px solid var(--accent);color:var(--text);width:100%;outline:none';
  const timeInput = document.createElement('input');
  timeInput.type = 'time';
  timeInput.value = meta?.t || '';
  timeInput.style.cssText = 'font-size:10px;padding:2px;border-radius:4px;background:var(--bg);border:1px solid var(--accent);color:var(--text);width:100%;outline:none';
  const save = async () => {
    const newDate = dateInput.value || null;
    const newTime = timeInput.value || null;
    const newMeta = { ...meta };
    if (newTime) newMeta.t = newTime; else delete newMeta.t;
    if (!newMeta.r) delete newMeta.r;
    const newMemo = buildMemoAll(memoText, newMeta, files);
    task.due_date = newDate;
    task.memo = newMemo;
    await dbUpdate('tasks', 'id=eq.' + id, { due_date: newDate, memo: newMemo });
  };
  let blurTimer;
  const onBlur = () => {
    clearTimeout(blurTimer);
    blurTimer = setTimeout(async () => {
      if (document.activeElement !== dateInput && document.activeElement !== timeInput) {
        _isInlineEditing = false;
        await save();
        renderTasks();
      }
    }, 150);
  };
  dateInput.addEventListener('focus', () => { _isInlineEditing = true; });
  timeInput.addEventListener('focus', () => { _isInlineEditing = true; });
  dateInput.addEventListener('blur', onBlur);
  timeInput.addEventListener('blur', onBlur);
  wrap.appendChild(dateInput);
  wrap.appendChild(timeInput);
  row2.children[2].replaceWith(wrap);
  dateInput.focus();
}

function startEditTask(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  const titleEl = document.querySelector(`#task-${id} .task-title`);
  if (!titleEl) return;
  const input = document.createElement('textarea');
  input.className = 'task-title-input';
  input.value = task.title;
  input.rows = 1;
  input.style.cssText = 'resize:none;overflow:hidden;line-height:1.5';
  titleEl.replaceWith(input);
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
  input.focus();
  _isInlineEditing = true;
  const save = async () => {
    _isInlineEditing = false;
    const newTitle = input.value.trim();
    if (newTitle && newTitle !== task.title) {
      await dbUpdate('tasks', 'id=eq.' + id, { title: newTitle });
      task.title = newTitle;
    }
    renderTasks();
  };
  input.addEventListener('blur', save);
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { _isInlineEditing = false; renderTasks(); }
  });
}

async function toggleTask(id, currentStatus) {
  const newStatus = currentStatus === 'done' ? 'pending' : 'done';
  const { error } = await dbUpdate('tasks', 'id=eq.' + id, { status: newStatus });
  if (error) { toast('エラー: ' + (error.message || JSON.stringify(error))); return; }
  const task = allTasks.find(t => t.id === id);
  if (task) task.status = newStatus;
  const children = allTasks.filter(t => t.parent_id === id);
  if (children.length > 0) {
    await Promise.all(children.map(c => dbUpdate('tasks', 'id=eq.' + c.id, { status: newStatus })));
    children.forEach(c => c.status = newStatus);
  }
  // 繰り返しタスク: 完了時に次のインスタンスを作成
  if (newStatus === 'done' && task?.due_date) {
    const { text: memoText, meta } = parseMemoAll(task.memo);
    if (meta?.r?.type) {
      const nextDate = calcNextDate(task.due_date, meta.r);
      const nextMemo = buildMemoAll(memoText, meta, []);
      await dbInsert('tasks', {
        project_id: task.project_id,
        title: task.title,
        assignee: task.assignee,
        due_date: nextDate,
        memo: nextMemo,
        created_by: currentUser.id,
      });
      globalMineView ? await loadMineTasks() : await loadTasks();
      toast('✓ 完了 → 次回 ' + nextDate + ' で作成しました');
      return;
    }
  }
  renderTasks();
  updateBadges();
  refreshMineBadge();
}

async function deleteTask(id) {
  const { error } = await dbDelete('tasks', 'id=eq.' + id);
  if (error) { toast('エラー: ' + (error.message || JSON.stringify(error))); return; }
  allTasks = allTasks.filter(t => t.id !== id);
  renderTasks();
  updateBadges();
  refreshMineBadge();
  toast('削除しました');
}

async function approveTask(id) {

  t.status = 'done';

  const options = [
    { value: '', label: '担当者' },
    { value: currentUser?.email ?? '', label: '👤 自分' },
    { value: 'ai:code', label: '⚡ Code' },
    { value: 'ai:cowork', label: '🔄 Cowork' },

    `<div onclick="selectAssignee('${o.value}','${o.label}')"
      style="padding:8px 12px;font-size:12px;cursor:pointer;white-space:nowrap"
      onmouseenter="this.style.background='var(--border)'"

  ).join('');

  // 下に空きがなければ上に開く

  const spaceBelow = window.innerHeight - (rect?.bottom ?? 0);
  menu.style.display = 'block';
  if (spaceBelow < menuH + 8) {
    menu.style.bottom = '100%';
    menu.style.top = 'auto';
    menu.style.marginBottom = '2px';
  } else {
    menu.style.top = '100%';
    menu.style.bottom = 'auto';

  }

  setTimeout(() => document.addEventListener('click', function closeMenu(e) {

      menu.style.display = 'none';

async function addTask() {
  // 自分宛モードではヘッダードロップダウンのプロジェクトを使用
  const projectId = currentProject?.id ?? document.getElementById('header-project-select')?.value;
  if (!projectId) { toast('プロジェクトを選択してください'); return; }

  const title = document.getElementById('input-title').value.trim();
  if (!title) { document.getElementById('input-title').focus(); return; }

  const assigneeEl = document.getElementById('input-assignee');
  const assignee = assigneeEl.tagName === 'SELECT' ? (assigneeEl.value || null) : (assigneeEl.value.trim() || null);
  const due_date = document.getElementById('input-due').value || null;
  const due_time = document.getElementById('input-time').value || null;
  const recurType = document.getElementById('input-recur-type').value;
  const recurInterval = parseInt(document.getElementById('input-recur-interval')?.value || '1');
  const recur = recurType ? { type: recurType, n: recurInterval } : null;
  const memoText = document.getElementById('input-memo').value.trim();
  const memo = buildMemoAll(memoText, { t: due_time, r: recur }, []);
  const parent_id = null;

  const { data, error } = await dbInsert('tasks', {
    project_id: projectId,
    title, assignee, due_date, memo, parent_id,
    created_by: currentUser.id,
  });

  if (error) { toast('エラー: ' + (error.message || JSON.stringify(error))); return; }
  const newTask = Array.isArray(data) ? data[0] : data;
  if (newTask) allTasks.push(newTask);
  document.getElementById('input-title').value = '';
  assigneeEl.value = '';
  const btn = document.getElementById('assignee-picker-btn');
  if (btn) btn.textContent = '担当者';
  document.getElementById('input-due').value = '';
  document.getElementById('input-time').value = '';
  document.getElementById('input-recur-type').value = '';
  toggleRecurInterval('add');
  document.getElementById('input-memo').value = '';
  renderTasks();
  updateBadges();
  refreshMineBadge();
  toast('追加しました');
}

function updateBadges() {
  const nonMem = allTasks.filter(t => !isMemTask(t) && !isNotifyTask(t));
  document.getElementById('badge-all').textContent = nonMem.length;
  document.getElementById('badge-pending').textContent = nonMem.filter(t => t.status === 'pending').length;
  document.getElementById('badge-overdue').textContent = nonMem.filter(t => t.status === 'overdue').length;
  document.getElementById('badge-mine').textContent = mineBadgeCount;
}

async function refreshMineBadge() {
  if (!currentUser) return;
  const email = encodeURIComponent(currentUser.email);
  const [mineRes, notifyRes] = await Promise.all([
    dbSelect('tasks', `select=id,memo,title&assignee=eq.${email}&status=in.(pending,overdue)`),
    dbSelect('tasks', `select=id,memo&assignee=eq.${email}&memo=like.*__NOTIFY__*`),
  ]);
  mineBadgeCount = (mineRes.data ?? []).filter(t =>
    !t.memo?.includes('__NOTIFY__') && !/^__MEM_\d+__/.test(t.title ?? '') && t.title !== '__PUSH_SUB__'
  ).length;
  document.getElementById('badge-mine').textContent = mineBadgeCount;
  const unreadCount = (notifyRes.data ?? []).filter(t => !t.memo?.includes('__READ__')).length;
  const nb = document.getElementById('badge-notify');
  nb.textContent = unreadCount || '';
  nb.style.display = unreadCount > 0 ? 'inline-block' : 'none';
  const nbm = document.getElementById('badge-notify-mobile');
  if (nbm) { nbm.textContent = unreadCount || ''; nbm.style.display = unreadCount > 0 ? 'inline-block' : 'none'; }
  // アプリアイコンのバッジを実際の未読通知数に同期
  if (navigator.setAppBadge) {
    unreadCount > 0 ? navigator.setAppBadge(unreadCount).catch(() => {}) : navigator.clearAppBadge().catch(() => {});
  }
}

function setView(v) {
  globalNotifyView = false;
  currentView = v;
  // プロジェクト未選択なら自分宛コンテキストを維持してMyタスクをフィルター
  globalMineView = !currentProject;

  document.getElementById('view-' + v)?.classList.add('active');
  document.querySelectorAll('.mobile-filter-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('mf-' + v)?.classList.add('active');
  if (currentProject) {
    // [BUG #1 再発防止] renderTasks()だけでは allTasks の古いデータを再利用する。
    // フィルター切り替えのたびに loadTasks() で必ず最新を fetch する。
    loadTasks();
  } else {
    // [BUG #1 再発防止] 自分宛コンテキストでも同様に毎回 fetch。キャッシュ流用禁止。
    // loadMineTasks() と同等の処理を行う（checkOverdue/updateBadges/refreshMineBadge を忘れずに）。

      allTasks = data ?? [];

      updateBadges();
      refreshMineBadge();
      renderTasks();
    });
  }
}

function notifyCard(t) {
  const { text: memoText } = parseMemoAll(t.memo);
  const cleanText = (memoText || '').replace(/__NOTIFY__|__READ__|__DOING__/g, '').trim();
  const proj = t.projects?.name ?? '';

async function saveEditTask() {
  const id = document.getElementById('edit-task-id').value;
  const title = document.getElementById('edit-task-title').value.trim();
  if (!title) return;
  const assignee = document.getElementById('edit-task-assignee').value;
  const due_date = document.getElementById('edit-task-due').value || null;
  const due_time = document.getElementById('edit-task-time').value || null;
  const recurType = document.getElementById('edit-task-recur-type').value;
  const recurN = parseInt(document.getElementById('edit-task-recur-interval')?.value || '1');
  const recur = recurType ? { type: recurType, n: recurN } : null;
  const memoText = document.getElementById('edit-task-memo').value.trim();
  const memo = buildMemoAll(memoText, { t: due_time, r: recur }, _editTaskFiles);
  const { error } = await dbUpdate('tasks', 'id=eq.' + id, { title, assignee: assignee || null, due_date, memo, updated_at: new Date().toISOString() });
  if (!error) {
    document.getElementById('edit-task-modal').style.display = 'none';
    // メモリ上のallTasksを即時更新してソートを反映
    const idx = allTasks.findIndex(t => t.id === id);
    if (idx !== -1) {
      allTasks[idx] = { ...allTasks[idx], title, assignee: assignee || null, due_date, memo };
    }
    renderTasks();
    toast('保存しました');
    loadTasks(); // バックグラウンドでサーバー同期
  } else {
    toast('保存に失敗しました: ' + (error.message || JSON.stringify(error)));
  }
}

// ── File Attachments ──────────────────────────────────────
const FILES_SEPARATOR = '\n__FILES__:';
let _editTaskFiles = []; // current edit modal's pending file list

function parseMemoFiles(memo) {
  if (!memo) return { text: '', files: [] };
  const idx = memo.indexOf(FILES_SEPARATOR);
  if (idx === -1) return { text: memo, files: [] };
  try {
    return { text: memo.slice(0, idx), files: JSON.parse(memo.slice(idx + FILES_SEPARATOR.length).trim()) };
  } catch { return { text: memo, files: [] }; }
}

function buildMemoWithFiles(text, files) {
  const t = (text || '').trim();
  if (!files || files.length === 0) return t || null;
  return (t ? t + '\n' : '') + FILES_SEPARATOR + JSON.stringify(files);
}

function renderAttachList(files) {
  const el = document.getElementById('edit-task-attach-list');
  if (!el) return;
  el.innerHTML = files.map((f, i) => {
    const isImg = /\.(png|jpe?g|gif|webp|svg)$/i.test(f.name);
    return `<div class="attach-item">
      <span>${isImg ? '🖼' : '📄'}</span>
      <a href="${esc(f.url)}" target="_blank" title="${esc(f.name)}">${esc(f.name)}</a>
      <button class="attach-remove" onclick="removeAttachment(${i})" title="削除">✕</button>
    </div>`;
  }).join('');
}

function removeAttachment(idx) {
  _editTaskFiles.splice(idx, 1);
  renderAttachList(_editTaskFiles);
}

async function handleFileSelect(input) {
  if (!input.files.length) return;
  const taskId = document.getElementById('edit-task-id').value;
  if (!taskId) { toast('先にタスクを開いてください'); return; }
  const statusEl = document.getElementById('upload-status');
  for (const file of input.files) {
    statusEl.textContent = `アップロード中: ${file.name}…`;
    try {
      const path = `${taskId}/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9._\-]/g, '_')}`;
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/task-attachments/${path}`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + (accessToken || SUPABASE_KEY), 'apikey': SUPABASE_KEY, 'Content-Type': file.type || 'application/octet-stream' },
        body: file,
      });
      if (!res.ok) throw new Error((await res.text()).slice(0, 80));
      const url = `${SUPABASE_URL}/storage/v1/object/public/task-attachments/${path}`;
      _editTaskFiles.push({ name: file.name, url, type: file.type, size: file.size });
      renderAttachList(_editTaskFiles);
    } catch (e) { toast(`アップロード失敗: ${e.message}`); }
  }
  statusEl.textContent = '';
  input.value = '';
}
